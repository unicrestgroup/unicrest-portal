<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unicrest IEA Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f0f0}
#app{display:flex;flex-direction:column;min-height:100vh}

/* TOP BAR */
#topbar{background:#fff;border-bottom:2px solid #c0392b;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
#topbar .brand{font-size:15px;font-weight:700;color:#333}
#topbar .brand em{color:#c0392b;font-style:normal}
.tabs{display:flex;gap:6px}
.tab{padding:7px 18px;border:1px solid #bbb;border-radius:4px;background:#f5f5f5;font-size:13px;cursor:pointer;font-family:Arial}
.tab.on{background:#c0392b;color:#fff;border-color:#c0392b}
#printbtn{padding:8px 18px;background:#c0392b;color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;font-family:Arial}
#printbtn:hover{background:#a93226}

/* FORM */
#formpanel{padding:20px;max-width:880px;margin:0 auto;width:100%}
.card{background:#fff;border:1px solid #ddd;border-radius:6px;padding:15px 18px;margin-bottom:14px}
.cardtitle{font-size:10px;font-weight:700;color:#c0392b;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.f{margin-bottom:10px}
.f label{display:block;font-size:11px;color:#555;font-weight:700;margin-bottom:3px}
.f input,.f select,.f textarea{width:100%;padding:7px 9px;border:1px solid #ccc;border-radius:4px;font-size:13px;font-family:Arial}
.f textarea{resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.typebtn{display:flex;gap:8px;margin-bottom:14px}
.tb{flex:1;padding:9px;border:1px solid #ccc;border-radius:4px;background:#fff;color:#666;font-size:13px;cursor:pointer;font-family:Arial;font-weight:600}
.tb.on{border-color:#c0392b;color:#c0392b;background:#fff8f7}
.tbar{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.tbar label{font-size:11px;font-weight:700;color:#555;white-space:nowrap}
.tbar select{flex:1;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:12px}
.tbar button{padding:6px 14px;border:1px solid #bbb;border-radius:4px;background:#f0f0f0;font-size:12px;cursor:pointer}
.gobtn{width:100%;padding:12px;background:#c0392b;color:#fff;border:none;border-radius:5px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px}

/* PREVIEW */
#prevpanel{display:none;padding:20px;background:#ccc;min-height:calc(100vh - 58px)}
.pg{background:#fff;width:100%;max-width:760px;margin:0 auto 2px;padding:26px 34px;font-family:Georgia,serif;font-size:10pt;line-height:1.55;color:#000}
.pg+.pg{border-top:3px dashed #aaa}
.phdr{display:flex;justify-content:flex-end;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:16px}
.phdr img{height:54px;width:auto}
.ph1{font-size:12pt;font-weight:bold;text-align:center;margin:10px 0 4px}
.ph2{font-size:11pt;font-weight:bold;margin:12px 0 5px}
.ph3{font-size:10pt;font-weight:bold;margin:8px 0 3px;text-decoration:underline}
.pp{margin:3px 0 5px}
.pftr{display:flex;justify-content:space-between;border-top:1px solid #999;margin-top:14px;padding-top:3px;font-size:8pt;color:#666}
.ptbl{width:100%;border-collapse:collapse;font-size:9.5pt;margin:6px 0}
.ptbl td{border:1px solid #000;padding:4px 7px;vertical-align:top}
.ptbl .k{font-weight:700;width:38%}
.sigs{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:14px}
.sigbox{border:1px solid #000;padding:10px}
.signm{font-size:9pt;font-weight:bold;margin-bottom:26px}
.sigl{border-top:1px solid #000;margin-bottom:4px}
.sigd{font-size:8pt}
ul.dl{padding-left:18px;margin:3px 0 6px}
ul.dl li{margin-bottom:2px}
ol.dl{padding-left:18px;margin:3px 0 6px}
ol.dl li{margin-bottom:2px}

/* PRINT - this is the only thing that matters */
#printarea{display:none}
@media print{
  #app,body,html{display:block!important}
  #topbar,#formpanel,#prevpanel{display:none!important}
  #printarea{display:block!important}
  .pg{padding:16mm 14mm!important;page-break-after:always!important;break-after:page!important;max-width:100%!important;border:none!important}
  .pg+.pg{border-top:none!important}
  @page{size:A4;margin:0}
}
</style>
</head>
<body>
<div id="app">

<div id="topbar">
  <div class="brand"><em>UNICREST</em> GROUP &nbsp;|&nbsp; IEA Builder</div>
  <div class="tabs">
    <button class="tab on" id="t-form" onclick="showForm()">Form</button>
    <button class="tab" id="t-prev" onclick="showPreview()">Preview</button>
  </div>
  <button id="printbtn" onclick="alert('JS works! Now calling doPrint...'); doPrint();">Print / Save PDF</button>
</div>

<div id="formpanel">
  <div style="max-width:880px;margin:0 auto;padding-top:20px">
    <div class="typebtn">
      <button class="tb on" id="bt-perm" onclick="setType('perm')">Permanent Employment</button>
      <button class="tb" id="bt-cas" onclick="setType('cas')">Casual Employment</button>
    </div>

    <div class="card">
      <div class="cardtitle">Offer Letter</div>
      <div class="g2">
        <div class="f"><label>Letter date</label><input type="date" id="f-date"></div>
        <div class="f"><label>Sign-back deadline</label><input type="date" id="f-deadline"></div>
        <div class="f"><label>Contact phone</label><input id="f-phone" value="09 438 6862"></div>
        <div class="f"><label>Contact email</label><input id="f-email" value="hamish@unicrest.com"></div>
      </div>
    </div>

    <div class="card">
      <div class="cardtitle">Employee</div>
      <div class="g2">
        <div class="f"><label>Full name</label><input id="f-name" placeholder="First Last"></div>
        <div class="f"><label>Address</label><input id="f-address" placeholder="e.g. 1/261 Kamo Road, Whangarei"></div>
      </div>
    </div>

    <div class="card">
      <div class="cardtitle">Role</div>
      <div class="f"><label>Position title</label><input id="f-pos" placeholder="e.g. Production Assistant"></div>
      <div class="g2">
        <div class="f"><label>Commencement date</label><input type="date" id="f-start"></div>
        <div class="f"><label>Place of work</label><input id="f-place" value="13 Nell Place, Whangarei 0110"></div>
        <div class="f" id="rn-wrap"><label>Reports to (name)</label><input id="f-rname" placeholder="e.g. Paulo De Almeida"></div>
        <div class="f" id="rt-wrap"><label>Reports to (title)</label><input id="f-rtitle" placeholder="e.g. Production Supervisor"></div>
        <div class="f" id="dept-wrap" style="display:none"><label>Department</label><input id="f-dept" placeholder="e.g. Supply Chain"></div>
      </div>
    </div>

    <div class="card">
      <div class="cardtitle">Compensation</div>
      <div class="typebtn" id="paytoggle">
        <button class="tb on" id="bt-sal" onclick="setPayType('salary')">Annual Salary</button>
        <button class="tb" id="bt-hr" onclick="setPayType('hourly')">Hourly Rate</button>
      </div>
      <div class="g2">
        <div class="f" id="sal-wrap"><label>Annual salary ($)</label><input type="number" id="f-sal" placeholder="55000"></div>
        <div class="f" id="hr-wrap" style="display:none"><label>Hourly rate ($)</label><input type="number" id="f-hr" placeholder="29.00" step="0.01"></div>
        <div class="f" id="ot-wrap" style="display:none"><label>Overtime rate ($)</label><input type="number" id="f-ot" placeholder="29.00" step="0.01"></div>
      </div>
      <div class="f"><label>Additional benefits</label><textarea id="f-benefits" rows="2">Introduction to the Growth By Sharing incentive scheme following the 90 day trial period</textarea></div>
    </div>

    <div class="card">
      <div class="cardtitle">Hours</div>
      <div class="g2">
        <div class="f"><label>Hours per week</label><input id="f-hrs" value="40"></div>
        <div class="f"><label>Working days</label><input id="f-days" value="Monday to Friday"></div>
        <div class="f"><label>Start time</label><input id="f-stime" value="8am"></div>
        <div class="f"><label>End time</label><input id="f-etime" value="5pm"></div>
      </div>
    </div>

    <div class="card" id="notice-card">
      <div class="cardtitle">Notice Periods</div>
      <div class="g3">
        <div class="f"><label>During trial period</label><input id="f-nt" value="1 week"></div>
        <div class="f"><label>Redundancy / resignation</label><input id="f-nr" value="2 weeks"></div>
        <div class="f"><label>Other reasons</label><input id="f-no" value="1 week"></div>
      </div>
    </div>

    <div class="card">
      <div class="cardtitle">Position Description</div>
      <div class="tbar">
        <label>Load template:</label>
        <select id="f-tmpl">
          <option value="">— select —</option>
          <option value="marketing">Marketing Specialist</option>
          <option value="accounts">Accounts &amp; Finance Assistant</option>
          <option value="assembly">Assembly Technician</option>
          <option value="production">Production Assistant</option>
        </select>
        <button onclick="loadTmpl()">Load</button>
      </div>
      <div class="f"><label>Role duties</label><textarea id="f-desc" rows="10" placeholder="Type or paste duties, or load a template above..."></textarea></div>
    </div>

    <button class="gobtn" onclick="showPreview()">Preview document &rarr;</button>
  </div>
</div>

<div id="prevpanel">
  <div id="doc-out"></div>
</div>

</div><!-- #app -->

<!-- print area lives outside #app so body > * hiding doesn't affect it strangely -->
<div id="printarea"></div>

var ctype = "perm";
var ptype = "salary";
var MO = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function ord(n){if(!n)return"___";n=parseInt(n);var s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function fdate(s){if(!s)return"___________";var p=s.split("-").map(Number);return ord(p[2])+" "+MO[p[1]-1]+" "+p[0];}
function fmoney(n){if(!n)return"[Amount]";return"$"+parseFloat(n).toLocaleString("en-NZ",{minimumFractionDigits:2,maximumFractionDigits:2});}
function g(id){var e=document.getElementById(id);return e?e.value.trim():"";}
function show(id,v){document.getElementById(id).style.display=v?"block":"none";}
function tb(id,v){document.getElementById(id).classList.toggle("on",v);}

function setType(t){
  ctype=t;
  tb("bt-perm",t==="perm"); tb("bt-cas",t==="cas");
  show("rn-wrap",t==="perm"); show("rt-wrap",t==="perm"); show("dept-wrap",t==="cas");
  show("notice-card",t==="perm");
  show("paytoggle",t==="perm");
  if(t==="cas"){ ptype="hourly"; show("sal-wrap",false); show("hr-wrap",true); show("ot-wrap",true); tb("bt-sal",false); tb("bt-hr",true); }
  else { setPayType(ptype); }
}

function setPayType(p){
  ptype=p;
  tb("bt-sal",p==="salary"); tb("bt-hr",p==="hourly");
  show("sal-wrap",p==="salary"); show("hr-wrap",p==="hourly"); show("ot-wrap",p==="hourly");
}

function showForm(){
  show("formpanel",true); show("prevpanel",false);
  tb("t-form",true); tb("t-prev",false);
}

function showPreview(){
  buildDoc();
  show("formpanel",false); show("prevpanel",true);
  tb("t-form",false); tb("t-prev",true);
}
