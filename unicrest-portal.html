<!DOCTYPE html>
<html lang="en">
<head>
<!--
=================================================================
 UNICREST APP PORTAL
 Microsoft SSO + SharePoint storage, no other dependencies.
=================================================================

 SETUP GUIDE (about 10 minutes total)
 ─────────────────────────────────────────────────────────────

 STEP 1 — Azure App Registration (portal.azure.com)
   a. Azure Active Directory > App registrations > New registration
   b. Name: "Unicrest App Portal"
   c. Supported account types: "Accounts in this organizational directory only"
   d. Redirect URI: Single-page application (SPA) > the URL where you will host this file
      (e.g. https://yourcompany.z6.web.core.windows.net/ or https://yoursite.sharepoint.com/apps/unicrest.html)
   e. Click Register. Copy the Application (client) ID and Directory (tenant) ID.
   f. API permissions > Add a permission > Microsoft Graph > Delegated permissions
      > Search "Sites.ReadWrite.All" > Add
   g. Click "Grant admin consent for [your org]" (requires Global Admin or SharePoint Admin)

 STEP 2 — SharePoint list
   a. Go to any SharePoint site your staff can access
   b. New > List, name it exactly: UnicrestApps
   c. Add the following columns (all "Single line of text" UNLESS noted):
        AppDescription   (Single line of text)
        Category         (Single line of text)
        Emoji            (Single line of text)
        HtmlSource       (Multiple lines of text — set to PLAIN TEXT, not enhanced)
        AddedBy          (Single line of text)
        DateAdded        (Single line of text)
      Note: "Title" is the built-in name column, no need to add it.

 STEP 3 — Fill in the 4 CONFIG values below

 STEP 4 — Host this file
   Recommended: Azure Blob Storage > Static website (free for small files)
   Alternatively: Azure Static Web Apps, any IIS/web server, SharePoint Embed web part
   The redirect URI in Step 1 must match exactly where you host this.

=================================================================
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicrest App Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.7.1/lib/msal-browser.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d0f14;
  --bg2:     #181b22;
  --bg3:     #1e2128;
  --border:  #2a2d35;
  --text:    #e8e4dc;
  --muted:   #7a6f5c;
  --dim:     #47453f;
  --gold:    #c8a96e;
  --golddark:#a8893e;
  --red:     #e24b4a;
  --mono:    'Courier New', monospace;
  --serif:   Georgia, serif;
}

body { background: var(--bg); color: var(--text); font-family: var(--serif); min-height: 100vh; }

/* ── Shared ── */
.hidden { display: none !important; }

.btn-gold {
  background: var(--gold); color: #0d0f14; border: none; border-radius: 6px;
  padding: 9px 20px; font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: var(--mono); letter-spacing: 0.04em; transition: background 0.15s;
}
.btn-gold:hover { background: var(--golddark); }
.btn-gold:disabled { opacity: 0.45; cursor: not-allowed; }

.btn-outline {
  background: none; border: 1px solid var(--border); color: var(--muted);
  border-radius: 6px; padding: 7px 14px; font-size: 12px; cursor: pointer;
  font-family: var(--mono); transition: border-color 0.15s, color 0.15s;
}
.btn-outline:hover { border-color: var(--muted); color: var(--text); }

/* ── Loading overlay ── */
#loading {
  position: fixed; inset: 0; background: var(--bg); display: flex;
  align-items: center; justify-content: center; z-index: 200;
  font-family: var(--mono); color: var(--muted); font-size: 13px; letter-spacing: 0.08em;
}

/* ── Login screen ── */
#login-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100vh; gap: 1.75rem; text-align: center;
}
.login-logo { display: flex; align-items: baseline; gap: 10px; }
.login-logo h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; }
.login-logo span {
  font-size: 12px; font-family: var(--mono); color: var(--muted);
  letter-spacing: 0.12em; text-transform: uppercase;
}
.login-sub {
  font-size: 13px; color: var(--muted); font-family: var(--mono);
  max-width: 280px; line-height: 1.7;
}
.ms-btn {
  background: #2f2f2f; color: #fff; border: none; border-radius: 4px;
  padding: 11px 22px; font-size: 14px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'Segoe UI', Arial, sans-serif; transition: background 0.15s;
}
.ms-btn:hover { background: #3a3a3a; }

/* ── Header ── */
header {
  border-bottom: 1px solid var(--border); padding: 0 2rem;
  display: flex; align-items: center; justify-content: space-between; height: 60px;
  position: sticky; top: 0; background: var(--bg); z-index: 10;
}
.header-logo { display: flex; align-items: baseline; gap: 10px; }
.header-logo strong { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
.header-logo em {
  font-size: 11px; font-family: var(--mono); color: var(--muted);
  letter-spacing: 0.12em; text-transform: uppercase; font-style: normal;
}
.header-right { display: flex; align-items: center; gap: 12px; }
.user-chip { font-size: 11px; font-family: var(--mono); color: var(--dim); }

/* ── Error banner ── */
#error-banner {
  margin: 0.75rem 2rem 0; padding: 10px 14px;
  background: #160a0a; border: 1px solid var(--red); border-radius: 6px;
  font-size: 12px; font-family: var(--mono); color: var(--red);
}

/* ── Toolbar ── */
.toolbar {
  padding: 1.25rem 2rem 0;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.search-input {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 12px; color: var(--text); font-size: 13px; font-family: var(--mono);
  width: 210px; outline: none;
}
.search-input:focus { border-color: var(--muted); }
.cat-pill {
  background: var(--bg2); color: var(--muted); border: 1px solid var(--border);
  border-radius: 100px; padding: 4px 14px; font-size: 11px; font-family: var(--mono);
  cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s; white-space: nowrap;
}
.cat-pill.active { background: var(--gold); color: #0d0f14; border-color: var(--gold); }

/* ── App grid ── */
.app-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 14px; padding: 1.25rem 2rem 2rem;
}
.app-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 1.25rem; display: flex; flex-direction: column; gap: 8px;
  transition: border-color 0.15s, background 0.15s;
}
.app-card:hover { border-color: #3a3d45; background: #1a1d24; }
.card-top { display: flex; align-items: center; justify-content: space-between; }
.card-emoji { font-size: 26px; line-height: 1; }
.card-cat {
  font-size: 10px; font-family: var(--mono); letter-spacing: 0.1em;
  color: var(--muted); text-transform: uppercase; background: var(--bg);
  border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px;
}
.card-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
.card-desc { font-size: 12px; color: var(--dim); line-height: 1.5; font-family: var(--mono); }
.card-footer {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-top: auto; padding-top: 10px; border-top: 1px solid var(--bg3);
}
.card-meta { display: flex; flex-direction: column; gap: 2px; }
.card-date { font-size: 10px; font-family: var(--mono); color: var(--dim); }
.card-by   { font-size: 10px; font-family: var(--mono); color: var(--dim); }
.card-actions { display: flex; gap: 6px; align-items: center; }
.btn-launch {
  background: none; border: 1px solid var(--border); color: var(--gold);
  cursor: pointer; font-size: 11px; padding: 4px 10px; border-radius: 4px;
  font-family: var(--mono); letter-spacing: 0.06em; transition: all 0.15s;
}
.btn-launch:hover { background: var(--bg3); border-color: var(--gold); }
.btn-delete {
  background: none; border: none; color: var(--dim); cursor: pointer;
  font-size: 13px; padding: 3px 6px; border-radius: 4px; font-family: var(--mono);
  transition: color 0.15s;
}
.btn-delete:hover { color: var(--red); }

.empty {
  grid-column: 1 / -1; text-align: center; padding: 4rem 2rem;
  color: var(--dim); font-family: var(--mono); font-size: 13px; line-height: 2;
}

/* ── Add form ── */
#add-view {
  max-width: 700px; margin: 0 auto; padding: 2rem;
  display: flex; flex-direction: column; gap: 1.25rem;
}
.form-hdr {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.25rem;
}
.form-hdr h2 {
  font-size: 13px; font-family: var(--mono); letter-spacing: 0.1em;
  color: var(--muted); text-transform: uppercase; font-weight: 400;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-label {
  font-size: 11px; font-family: var(--mono); letter-spacing: 0.1em;
  color: var(--muted); text-transform: uppercase;
}
.form-input, .form-select {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
  padding: 9px 12px; color: var(--text); font-size: 13px; font-family: var(--mono);
  outline: none; width: 100%;
}
.form-input:focus, .form-select:focus { border-color: var(--muted); }
.form-select option { background: var(--bg2); }
.form-textarea {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 12px; color: var(--text); font-size: 12px; font-family: var(--mono);
  outline: none; width: 100%; resize: vertical; min-height: 200px; line-height: 1.5;
}
.form-textarea:focus { border-color: var(--muted); }
.form-hint { font-size: 11px; font-family: var(--mono); color: var(--dim); line-height: 1.5; }
.emoji-row { display: flex; flex-wrap: wrap; gap: 6px; }
.emoji-btn {
  font-size: 20px; padding: 5px 9px; background: none;
  border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: border-color 0.1s;
}
.emoji-btn.active { background: var(--bg3); border-color: var(--gold); }

/* ── Launch view ── */
#launch-view { display: flex; flex-direction: column; height: 100vh; }
.launch-bar {
  border-bottom: 1px solid var(--border); padding: 0 1.5rem;
  display: flex; align-items: center; justify-content: space-between; height: 50px;
  background: var(--bg); flex-shrink: 0;
}
.launch-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-family: var(--mono); color: var(--muted);
}
#app-iframe { flex: 1; border: none; background: #fff; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">Initialising...</div>

<!-- Login -->
<div id="login-screen" class="hidden">
  <div class="login-logo">
    <h1>Unicrest</h1>
    <span>App Portal</span>
  </div>
  <p class="login-sub">Internal tools hub. Sign in with your Microsoft account to continue.</p>
  <button class="ms-btn" id="signin-btn" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 21 21">
      <rect x="1"  y="1"  width="9" height="9" fill="#f25022"/>
      <rect x="11" y="1"  width="9" height="9" fill="#7fba00"/>
      <rect x="1"  y="11" width="9" height="9" fill="#00a4ef"/>
      <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
    </svg>
    Sign in with Microsoft
  </button>
</div>

<!-- Main app -->
<div id="main-app" class="hidden">
  <header>
    <div class="header-logo">
      <strong>Unicrest</strong>
      <em>App Portal</em>
    </div>
    <div class="header-right">
      <span class="user-chip" id="user-name"></span>
      <button class="btn-gold" onclick="showView('add')">+ Add app</button>
      <button class="btn-outline" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div id="error-banner" class="hidden"></div>

  <!-- Gallery -->
  <div id="gallery-view">
    <div class="toolbar">
      <input class="search-input" type="text" id="search-input"
             placeholder="Search apps..." oninput="filterApps(this.value)">
      <div id="cat-pills" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    </div>
    <div class="app-grid" id="app-grid"></div>
  </div>

  <!-- Add form -->
  <div id="add-view" class="hidden">
    <div class="form-hdr">
      <h2>Add new app</h2>
      <button class="btn-outline" onclick="showView('gallery')">Cancel</button>
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">App name</label>
        <input class="form-input" id="f-name" placeholder="e.g. Invoice Calculator">
      </div>
      <div class="form-field">
        <label class="form-label">Category</label>
        <select class="form-select" id="f-cat">
          <option>Productivity</option>
          <option>Finance</option>
          <option>Data</option>
          <option>Writing</option>
          <option>Utilities</option>
          <option>Research</option>
          <option>HR</option>
          <option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-field">
      <label class="form-label">Description (optional)</label>
      <input class="form-input" id="f-desc" placeholder="One-line description">
    </div>
    <div class="form-field">
      <label class="form-label">Icon</label>
      <div class="emoji-row" id="emoji-row"></div>
    </div>
    <div class="form-field">
      <label class="form-label">HTML source</label>
      <textarea class="form-textarea" id="f-html"
        placeholder="Paste the full HTML for your Claude-generated app here..."
        spellcheck="false"></textarea>
      <p class="form-hint">Max approximately 60,000 characters. Very large apps may need to be split.</p>
    </div>
    <button class="btn-gold" id="submit-btn" onclick="submitApp()">Save to portal</button>
  </div>

  <!-- Launch -->
  <div id="launch-view" class="hidden">
    <div class="launch-bar">
      <div class="launch-title">
        <span id="launch-emoji"></span>
        <span id="launch-name"></span>
      </div>
      <button class="btn-outline" onclick="showView('gallery')">← Back to portal</button>
    </div>
    <iframe id="app-iframe" sandbox="allow-scripts allow-forms allow-same-origin" title="App"></iframe>
  </div>
</div>

<script>
// ================================================================
//  CONFIGURATION — fill in these 4 values after setup
// ================================================================
const CONFIG = {
  clientId:    "c6595fee-5861-474a-b604-4487ac361580",
  tenantId:    "8c8bc073-973e-4ddf-9384-38498e8aa324",
  spHostname:  "unicrest.sharepoint.com",
  spSitePath:  "/sites/UnicrestGroup",
  listName:    "UnicrestApps"
};
// ================================================================

const EMOJIS = ["⚡","📊","🗂","✏️","🔧","🔬","📝","🧮","📈","🗺","🎯","💡","🔐","📅","🧩","🖥","📋","🔍","⚙️","🗃"];
const CATS   = ["Productivity","Finance","Data","Writing","Utilities","Research","HR","Other"];

let msalApp, siteId = null, listId = null;
let allApps = [], currentSearch = '', currentCat = 'All';
let selectedEmoji = EMOJIS[0];
let saving = false;

// ── MSAL config ──────────────────────────────────────────────
const msalConfig = {
  auth: {
    clientId: CONFIG.clientId,
    authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: window.location.href.split('?')[0].split('#')[0]
  },
  cache: { cacheLocation: "sessionStorage" }
};

const TOKEN_REQUEST = { scopes: ["https://graph.microsoft.com/Sites.ReadWrite.All"] };

// ── Init ─────────────────────────────────────────────────────
async function init() {
  try {
    msalApp = new msal.PublicClientApplication(msalConfig);
    await msalApp.initialize();

    const redirect = await msalApp.handleRedirectPromise();
    const accounts  = msalApp.getAllAccounts();

    if (accounts.length > 0) {
      msalApp.setActiveAccount(accounts[0]);
      await enterApp(accounts[0]);
    } else if (redirect) {
      msalApp.setActiveAccount(redirect.account);
      await enterApp(redirect.account);
    } else {
      hide('loading'); show('login-screen');
    }
  } catch (e) {
    hide('loading'); show('login-screen');
    showError('Init error: ' + e.message);
  }
}

async function enterApp(account) {
  document.getElementById('user-name').textContent = account.name || account.username;
  buildEmojiPicker();
  show('main-app');
  hide('loading');
  await loadApps();
  showView('gallery');
}

// ── Auth ─────────────────────────────────────────────────────
async function signIn() {
  try {
    document.getElementById('signin-btn').textContent = 'Signing in...';
    const r = await msalApp.loginPopup(TOKEN_REQUEST);
    msalApp.setActiveAccount(r.account);
    await enterApp(r.account);
  } catch (e) {
    document.getElementById('signin-btn').innerHTML = `
      <svg width="18" height="18" viewBox="0 0 21 21">
        <rect x="1"  y="1"  width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1"  width="9" height="9" fill="#7fba00"/>
        <rect x="1"  y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>Sign in with Microsoft`;
    if (e.errorCode !== 'user_cancelled') showError('Sign-in failed: ' + e.message);
  }
}

function signOut() {
  msalApp.logoutPopup().finally(() => location.reload());
}

async function getToken() {
  const account = msalApp.getActiveAccount();
  const r = await msalApp.acquireTokenSilent({ ...TOKEN_REQUEST, account })
    .catch(() => msalApp.acquireTokenPopup(TOKEN_REQUEST));
  return r.accessToken;
}

// ── Graph helpers ─────────────────────────────────────────────
async function gGet(path) {
  const token = await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + path, {
    headers: { Authorization: 'Bearer ' + token }
  });
  if (!r.ok) throw new Error(`Graph ${path} → ${r.status} ${r.statusText}`);
  return r.json();
}

async function gPost(path, body) {
  const token = await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + path, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const t = await r.text().catch(() => '');
    throw new Error(`Graph POST ${path} → ${r.status}: ${t}`);
  }
  return r.json();
}

async function gDelete(path) {
  const token = await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + path, {
    method: 'DELETE',
    headers: { Authorization: 'Bearer ' + token }
  });
  if (!r.ok) throw new Error(`Graph DELETE ${path} → ${r.status}`);
}

// ── SharePoint ────────────────────────────────────────────────
async function resolveSiteList() {
  if (siteId && listId) return;
  const site = await gGet(`/sites/${CONFIG.spHostname}:${CONFIG.spSitePath}`);
  siteId = site.id;
  const lists = await gGet(`/sites/${siteId}/lists?$filter=name eq '${CONFIG.listName}'&$select=id,name`);
  if (!lists.value?.length) {
    throw new Error(`SharePoint list "${CONFIG.listName}" not found. Check STEP 2 of setup.`);
  }
  listId = lists.value[0].id;
}

// ── Safe base64 for full Unicode HTML ────────────────────────
function encodeHTML(str) {
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
    (_, hex) => String.fromCharCode(parseInt(hex, 16))));
}
function decodeHTML(b64) {
  if (!b64) return '';
  try {
    return decodeURIComponent(Array.from(atob(b64),
      c => '%' + c.charCodeAt(0).toString(16).padStart(2, '0')).join(''));
  } catch { return ''; }
}

// ── App CRUD ──────────────────────────────────────────────────
async function loadApps() {
  document.getElementById('app-grid').innerHTML =
    '<div class="empty">Loading apps...</div>';
  try {
    await resolveSiteList();
    const data = await gGet(`/sites/${siteId}/lists/${listId}/items?expand=fields&$top=500`);
    allApps = (data.value || []).map(item => ({
      id:          item.id,
      name:        item.fields.Title         || '',
      description: item.fields.AppDescription || '',
      category:    item.fields.Category       || 'Other',
      emoji:       item.fields.Emoji          || '⚡',
      html:        decodeHTML(item.fields.HtmlSource),
      addedBy:     item.fields.AddedBy        || '',
      dateAdded:   item.fields.DateAdded      || item.createdDateTime || ''
    }));
    renderGrid();
  } catch (e) {
    showError(e.message);
    allApps = [];
    renderGrid();
  }
}

async function submitApp() {
  if (saving) return;
  const name = document.getElementById('f-name').value.trim();
  const html = document.getElementById('f-html').value.trim();
  if (!name || !html) { showError('App name and HTML source are required.'); return; }

  const account = msalApp.getActiveAccount();
  const fields = {
    Title:          name,
    AppDescription: document.getElementById('f-desc').value.trim(),
    Category:       document.getElementById('f-cat').value,
    Emoji:          selectedEmoji,
    HtmlSource:     encodeHTML(html),
    AddedBy:        account?.name || account?.username || '',
    DateAdded:      new Date().toISOString()
  };

  saving = true;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    await resolveSiteList();
    await gPost(`/sites/${siteId}/lists/${listId}/items`, { fields });
    document.getElementById('f-name').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-html').value = '';
    document.getElementById('f-cat').value = 'Productivity';
    setEmoji(EMOJIS[0]);
    await loadApps();
    showView('gallery');
  } catch (e) {
    showError(e.message);
  } finally {
    saving = false;
    btn.disabled = false;
    btn.textContent = 'Save to portal';
  }
}

async function deleteApp(id) {
  if (!confirm('Remove this app from the portal?')) return;
  try {
    await resolveSiteList();
    await gDelete(`/sites/${siteId}/lists/${listId}/items/${id}`);
    allApps = allApps.filter(a => a.id !== id);
    renderGrid();
  } catch (e) {
    showError(e.message);
  }
}

// ── UI ────────────────────────────────────────────────────────
function showView(v) {
  ['gallery','add','launch'].forEach(n =>
    document.getElementById(n + '-view').classList.add('hidden'));
  document.getElementById(v + '-view').classList.remove('hidden');
  if (v === 'gallery') renderGrid();
}

function filterApps(val) { currentSearch = val; renderGrid(); }

function setCat(cat) { currentCat = cat; renderCatPills(); renderGrid(); }

function getFiltered() {
  const s = currentSearch.toLowerCase();
  return allApps.filter(a =>
    (currentCat === 'All' || a.category === currentCat) &&
    (!s || a.name.toLowerCase().includes(s) || a.description.toLowerCase().includes(s))
  );
}

function renderCatPills() {
  const cats = ['All', ...new Set(allApps.map(a => a.category))];
  document.getElementById('cat-pills').innerHTML = cats.map(c =>
    `<button class="cat-pill${c === currentCat ? ' active' : ''}" onclick="setCat('${esc(c)}')">${esc(c)}</button>`
  ).join('');
}

function renderGrid() {
  renderCatPills();
  const apps = getFiltered();
  const grid = document.getElementById('app-grid');
  if (!apps.length) {
    grid.innerHTML = `<div class="empty">${
      allApps.length === 0
        ? 'No apps yet.<br>Click "+ Add app" to add your first one.'
        : 'No apps match your search.'
    }</div>`;
    return;
  }
  grid.innerHTML = apps.map(a => `
    <div class="app-card">
      <div class="card-top">
        <span class="card-emoji">${a.emoji}</span>
        <span class="card-cat">${esc(a.category)}</span>
      </div>
      <div class="card-name">${esc(a.name)}</div>
      ${a.description ? `<div class="card-desc">${esc(a.description)}</div>` : ''}
      <div class="card-footer">
        <div class="card-meta">
          <span class="card-date">${fmtDate(a.dateAdded)}</span>
          ${a.addedBy ? `<span class="card-by">${esc(a.addedBy)}</span>` : ''}
        </div>
        <div class="card-actions">
          <button class="btn-delete" onclick="deleteApp('${a.id}')" title="Remove">✕</button>
          <button class="btn-launch" onclick="launchApp('${a.id}')">Launch →</button>
        </div>
      </div>
    </div>`).join('');
}

function launchApp(id) {
  const a = allApps.find(x => x.id === id);
  if (!a) return;
  document.getElementById('launch-emoji').textContent = a.emoji;
  document.getElementById('launch-name').textContent  = a.name;
  document.getElementById('app-iframe').srcdoc = a.html;
  showView('launch');
}

function buildEmojiPicker() {
  document.getElementById('emoji-row').innerHTML = EMOJIS.map(e =>
    `<button class="emoji-btn${e === selectedEmoji ? ' active' : ''}"
      onclick="setEmoji('${e}')">${e}</button>`
  ).join('');
}

function setEmoji(e) {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === e);
  });
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.add('hidden'), 10000);
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function esc(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('en-NZ', { day:'2-digit', month:'short', year:'numeric' }); }
  catch { return ''; }
}

init();
</script>
</body>
</html>
