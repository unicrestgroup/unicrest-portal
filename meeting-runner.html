<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Runner | Unicrest Group</title>
<link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.0/lib/msal-browser.min.js"></script>
<style>
:root{--red:#EF3E42;--dark:#231F20;--mid:#464749;--bg:#EEEEEE;--white:#fff;--green:#2E7D32;--amber:#F57F17;--blue:#1565C0;--lr:#FFEBEE;--lg:#E8F5E9;--la:#FFF8E1;--lb:#E3F2FD;--bdr:#D5D5D5;--sh:0 2px 8px rgba(0,0,0,.08);--r:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Arvo',serif;background:var(--bg);color:var(--dark);min-height:100vh;overflow-x:hidden}
button{font-family:'Arvo',serif;cursor:pointer;border:none}
input,textarea,select{font-family:'Arvo',serif}

/* Header */
.hdr{background:linear-gradient(135deg,var(--dark) 0%,#2a2526 60%,var(--mid) 100%);color:var(--white);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:200;height:46px}
.hdr h1{font-size:16px;font-weight:700;letter-spacing:.5px}
.hdr h1 span{color:var(--red)}
.hdr-r{display:flex;align-items:center;gap:10px;font-size:12px}
.hdr-btn{background:rgba(255,255,255,.12);color:var(--white);padding:5px 12px;border-radius:5px;font-size:11px;font-weight:700;transition:background .2s}
.hdr-btn:hover{background:rgba(255,255,255,.22)}
.hdr-btn.red{background:var(--red)}
.hdr-btn.red:hover{background:#d63336}

/* Layout */
.page{margin-top:46px;min-height:calc(100vh - 46px)}
.wrap{max-width:700px;margin:0 auto;padding:16px 14px 60px}

/* Login */
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 46px);text-align:center}
.login-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:40px 32px;width:100%;max-width:400px}
.login-card h2{font-size:22px;margin-bottom:4px}
.login-card h2 span{color:var(--red)}
.login-card p{font-size:13px;color:var(--mid);margin-bottom:24px}
.login-btn{background:var(--dark);color:var(--white);padding:12px 24px;border-radius:6px;font-size:14px;font-weight:700;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s}
.login-btn:hover{background:var(--mid)}
.tagline{font-size:11px;color:var(--mid);margin-top:16px;font-style:italic}

/* Cards */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;margin-bottom:10px}
.card.click{cursor:pointer;transition:box-shadow .2s}
.card.click:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.badge{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.badge.rec{background:var(--lb);color:var(--blue)}
.badge.one{background:var(--bg);color:var(--mid)}
.grp-label{margin-top:16px;margin-bottom:8px;font-size:12px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.grp-label .cnt{font-weight:400;opacity:.6}
.start-btn{background:var(--red);color:var(--white);text-align:center;padding:9px;border-radius:6px;font-size:13px;font-weight:700;margin-top:10px;width:100%;transition:background .2s}
.start-btn:hover{background:#d63336}
.adhoc-btn{border:1px dashed var(--bdr);border-radius:var(--r);padding:12px;text-align:center;font-size:13px;color:var(--mid);margin-top:6px;background:none;width:100%;transition:all .2s}
.adhoc-btn:hover{border-color:var(--red);color:var(--red)}

/* Runner sidebar */
.runner{display:flex;height:calc(100vh - 46px)}
.sidebar{width:220px;background:#f7f7f7;border-right:1px solid var(--bdr);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.sb-meeting{padding:12px 14px;border-bottom:1px solid var(--bdr);font-size:13px;font-weight:700}
.sb-meeting small{font-weight:400;color:var(--mid);display:block;margin-top:2px;font-size:11px}
.sb-item{padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mid);cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.sb-item:hover{background:#f0f0f0}
.sb-item.active{background:var(--white);border-left-color:var(--red);color:var(--dark);font-weight:700}
.sb-item.done{opacity:.6}
.sn{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:var(--white);background:var(--bdr)}
.sn.act{background:var(--red)}
.sn.done{background:var(--green)}
.sb-item .sb-time{margin-left:auto;font-size:10px;font-variant-numeric:tabular-nums;flex-shrink:0}
.sb-item .sb-time.over{color:var(--red);font-weight:700}
.sb-section{border-top:1px solid var(--bdr);padding:12px 14px;margin-top:auto}
.sb-section-label{font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sb-edit-btn{background:none;color:var(--blue);font-size:11px;padding:4px 0;text-decoration:underline;margin-top:8px;display:block}

/* Main content */
.main{flex:1;overflow-y:auto;padding:20px 24px 40px;background:var(--white)}
.main-title{font-size:16px;font-weight:700;margin-bottom:4px}
.main-sub{font-size:12px;color:var(--mid);margin-bottom:14px}
.main-nav{display:flex;gap:8px;margin-top:24px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--bg)}

/* Timer */
.t-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.t-disp{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;min-width:70px;text-align:center}
.t-disp.over{color:var(--red)}
.t-btn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--dark);color:var(--white);transition:background .2s}
.t-btn:hover{background:var(--mid)}
.t-bar{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.t-fill{height:100%;background:var(--green);border-radius:2px;transition:width 1s linear,background .3s}
.t-fill.warn{background:var(--amber)}
.t-fill.over{background:var(--red)}

/* Form elements */
textarea.notes{width:100%;min-height:80px;border:1px solid var(--bdr);border-radius:6px;padding:10px 12px;font-size:13px;resize:vertical;line-height:1.5}
textarea.notes:focus{outline:2px solid var(--red);border-color:transparent}
.sub-l{font-size:11px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 6px}
.add-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.add-row input,.add-row select{padding:7px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:12px;background:var(--white)}
.add-row input{flex:1;min-width:100px}
.add-row input:focus,.add-row select:focus{outline:2px solid var(--red);border-color:transparent}
.add-btn{background:var(--red);color:var(--white);padding:7px 14px;border-radius:6px;font-size:12px;font-weight:700;transition:background .2s;white-space:nowrap}
.add-btn:hover{background:#d63336}
.add-btn.sec{background:var(--dark)}

/* Headlines */
.hl-item{background:var(--bg);border-radius:6px;padding:10px 12px;margin-bottom:8px}
.hl-text{font-size:13px;font-weight:700;flex:1}
.hl-meta{font-size:10px;color:var(--mid);margin-top:2px}
.hl-status{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;text-transform:uppercase;cursor:pointer}
.hl-status.open{background:var(--lb);color:var(--blue)}
.hl-status.discussed{background:var(--lg);color:var(--green)}
.hl-action-btn{font-size:11px;color:var(--red);background:none;padding:4px 0;margin-top:4px;font-weight:700}

/* Actions */
.a-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--bg)}
.a-item:last-child{border-bottom:none}
.a-chk{width:20px;height:20px;border:2px solid var(--bdr);border-radius:4px;flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:11px}
.a-chk.done{background:var(--green);border-color:var(--green);color:white}
.a-txt{font-size:13px;line-height:1.4;flex:1}
.a-txt.dn{text-decoration:line-through;opacity:.5}
.a-meta{font-size:11px;color:var(--mid);margin-top:1px}
.a-meta span{margin-right:10px}
.cf-badge{font-size:9px;background:var(--la);color:var(--amber);padding:1px 6px;border-radius:8px;font-weight:700;margin-left:4px}
.a-rm{background:none;color:var(--bdr);font-size:15px;padding:2px 4px;line-height:1}
.a-rm:hover{color:var(--red)}

/* Issues */
.ib{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;cursor:pointer}
.ib.open{background:var(--lr);color:var(--red)}
.ib.discussing{background:var(--la);color:var(--amber)}
.ib.solved{background:var(--lg);color:var(--green)}

/* Summary */
.sum-sec{margin-bottom:16px}
.sum-sec h3{font-size:12px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:250;display:flex;align-items:center;justify-content:center}
.modal{background:var(--white);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.2);padding:24px;width:90%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:16px;margin-bottom:16px}
.modal-sec{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bg)}
.modal-sec input{flex:1;padding:6px 8px;border:1px solid var(--bdr);border-radius:4px;font-size:12px}
.modal-sec input:focus{outline:2px solid var(--red);border-color:transparent}
.modal-sec .dur-input{width:60px}

/* Scheduler */
.sched-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:250;display:flex;justify-content:flex-end}
.sched-panel{width:min(680px,90vw);background:var(--white);height:100%;overflow-y:auto;display:flex;flex-direction:column}
.sched-hdr{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sched-hdr h3{font-size:15px;font-weight:700}
.sched-body{padding:16px 18px;flex:1;overflow-y:auto}
.sched-field{margin-bottom:14px}
.sched-field label{display:block;font-size:11px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.sched-field input,.sched-field select{width:100%;padding:8px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:13px}
.sched-field input:focus{outline:2px solid var(--red);border-color:transparent}
.sched-chip{background:var(--bg);padding:4px 10px;border-radius:14px;font-size:11px;display:inline-flex;align-items:center;gap:5px;margin:2px}
.sched-chip button{background:none;color:var(--mid);font-size:13px;padding:0;line-height:1}
.sched-chip button:hover{color:var(--red)}
.sched-results{position:absolute;background:var(--white);border:1px solid var(--bdr);border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.12);max-height:180px;overflow-y:auto;z-index:10;left:0;right:0;margin-top:2px}
.sched-result{padding:8px 12px;font-size:12px;cursor:pointer;display:flex;flex-direction:column}
.sched-result:hover{background:var(--bg)}
.sched-result small{color:var(--mid);font-size:10px}
.tl-wrap{overflow-x:auto;margin:14px 0}
.tl-row{display:flex;align-items:center;border-bottom:1px solid var(--bg);height:28px}
.tl-name{width:100px;font-size:10px;padding-right:6px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-blocks{flex:1;display:flex;position:relative;height:100%;cursor:pointer}
.tl-slot{height:100%;border-right:1px solid rgba(0,0,0,.04)}
.tl-slot.busy{background:#e57373}
.tl-slot.tentative{background:#ffb74d}
.tl-slot.oof{background:#ce93d8}
.tl-slot.elsewhere{background:#90caf9}
.tl-sel{position:absolute;top:0;bottom:0;background:rgba(239,62,66,.25);border:2px solid var(--red);border-radius:3px;pointer-events:none}
.sched-foot{padding:14px 18px;border-top:1px solid var(--bdr);display:flex;gap:8px;flex-shrink:0}

/* Utilities */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--mid);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--mid);font-size:14px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--dark);color:var(--white);padding:10px 18px;border-radius:6px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

@media print{.hdr,.sidebar{display:none}.runner{display:block}.main{padding:0}}
@media(max-width:700px){.sidebar{width:180px}.main{padding:14px 16px 40px}}
@media(max-width:500px){.sidebar{display:none}.runner{display:block}}
</style>
</head>
<body>
<div class="hdr">
  <h1>MEETING <span>RUNNER</span></h1>
  <div class="hdr-r">
    <button class="hdr-btn red" id="bookBtn" style="display:none" onclick="openScheduler()">Book a meeting</button>
    <span id="clockEl" style="color:rgba(255,255,255,.5);font-variant-numeric:tabular-nums"></span>
    <span id="userEl" style="color:rgba(255,255,255,.5)"></span>
    <button class="hdr-btn" id="hdrBtn" style="display:none"></button>
  </div>
</div>
<div class="page" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ═══ CONFIG ═══ */
const CFG={
  clientId:'c6595fee-5861-474a-b604-4487ac361580',
  authority:'https://login.microsoftonline.com/8c8bc073-973e-4ddf-9384-38498e8aa324',
  redirectUri:window.location.origin+window.location.pathname,
  scopes:['User.Read','User.ReadBasic.All','Calendars.ReadWrite','Mail.Send','Sites.ReadWrite.All'],
  spSite:'unicrest.sharepoint.com:/sites/UnicrestGroup'
};
const G='https://graph.microsoft.com/v1.0';
const DEF_AGENDA=[
  {name:'Check-in',duration:5,type:'checkin'},
  {name:'Updates',duration:10,type:'headlines'},
  {name:'Issues & Actions',duration:35,type:'issues'},
  {name:'Wrap-up',duration:5,type:'wrapup'}
];
const ROOM_WORDS=['room','fishbowl','boardroom','conference','resource'];
function isRoom(email){if(!email)return false;const l=email.toLowerCase();return ROOM_WORDS.some(w=>l.includes(w));}

let msalApp,accessToken,currentUser,siteId;
let tInt=null;

/* ═══ STATE ═══ */
let S={
  screen:'login',
  meetings:[],allMeetings:[],loadingCal:false,enabledSeries:new Set(),
  viewDate:new Date(),
  prepMeeting:null,prepSeriesId:null,prepAgenda:[],
  activeMeeting:null,seriesId:null,curSec:0,
  sections:[],headlines:[],actions:[],issues:[],ratings:[],
  attendees:[],attendance:{},
  timerOn:false,elapsed:0,startTime:null,
  showAgendaEditor:false,editAgenda:[],
  showScheduler:false,schedSubject:'',schedDate:'',schedStartHr:7,schedEndHr:19,
  schedDuration:30,schedTeams:true,schedPeople:[],schedSearchResults:[],
  schedAvail:[],schedSelTime:null,schedLoading:false,
  calEvents:[],calLoading:false,calWeekStart:null
};

/* ═══ LISTS ═══ */
const LISTS={config:{name:'MR_Config',id:null},headlines:{name:'MR_Headlines',id:null},actions:{name:'MR_Actions',id:null},issues:{name:'MR_Issues',id:null},ratings:{name:'MR_Ratings',id:null}};

/* ═══ GRAPH HELPERS ═══ */
async function getToken(){try{const r=await msalApp.acquireTokenSilent({scopes:CFG.scopes,account:currentUser});accessToken=r.accessToken;return accessToken;}catch{await msalApp.acquireTokenRedirect({scopes:CFG.scopes});return null;}}
async function gGet(u){const t=await getToken();if(!t)return null;const r=await fetch(G+u,{headers:{Authorization:'Bearer '+t}});if(!r.ok){console.error('GET',r.status,u);return null;}return r.json();}
async function gPost(u,b){const t=await getToken();if(!t)return null;const r=await fetch(G+u,{method:'POST',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify(b)});if(!r.ok){const e=await r.text();console.error('POST',r.status,u,e);return null;}if(r.status===202)return{ok:true};return r.json();}
async function gPatch(u,b){const t=await getToken();if(!t)return null;const r=await fetch(G+u,{method:'PATCH',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify(b)});if(!r.ok)console.error('PATCH',r.status,u);return r.ok;}
async function gDel(u){const t=await getToken();if(!t)return;await fetch(G+u,{method:'DELETE',headers:{Authorization:'Bearer '+t}});}

/* ═══ SHAREPOINT ═══ */
function spUrl(k){return `/sites/${siteId}/lists/${LISTS[k].id}`;}
async function spItems(k,field,val){const d=await gGet(spUrl(k)+'/items?$expand=fields&$top=200');const items=d&&d.value?d.value:[];if(field&&val)return items.filter(i=>i.fields&&i.fields[field]===val);return items;}
async function spAdd(k,fields){return await gPost(spUrl(k)+'/items',{fields});}
async function spUpd(k,id,fields){return await gPatch(spUrl(k)+`/items/${id}/fields`,fields);}
async function spDel(k,id){await gDel(spUrl(k)+`/items/${id}`);}

async function initSP(){
  const site=await gGet('/sites/'+CFG.spSite);
  if(!site){console.error('SP site not found');return;}
  siteId=site.id;
  const ex=await gGet(`/sites/${siteId}/lists?$select=id,displayName`);
  const lists=ex&&ex.value?ex.value:[];
  const schemas={
    config:[{name:'SeriesId',text:{}},{name:'AgendaJSON',text:{allowMultipleLines:true}}],
    headlines:[{name:'SeriesId',text:{}},{name:'MeetingDate',text:{}},{name:'CreatedByName',text:{}},{name:'Status',text:{}},{name:'Notes',text:{allowMultipleLines:true}}],
    actions:[{name:'SeriesId',text:{}},{name:'Owner',text:{}},{name:'DueDate',text:{}},{name:'Status',text:{}},{name:'Section',text:{}},{name:'MeetingDate',text:{}},{name:'CreatedByName',text:{}}],
    issues:[{name:'SeriesId',text:{}},{name:'Status',text:{}},{name:'Notes',text:{allowMultipleLines:true}},{name:'CreatedByName',text:{}}],
    ratings:[{name:'SeriesId',text:{}},{name:'MeetingDate',text:{}},{name:'RatedBy',text:{}},{name:'Rating',text:{}}]
  };
  for(const k of Object.keys(LISTS)){
    const f=lists.find(l=>l.displayName===LISTS[k].name);
    if(f){LISTS[k].id=f.id;}else{
      const c=await gPost(`/sites/${siteId}/lists`,{displayName:LISTS[k].name,columns:schemas[k],list:{template:'genericList'}});
      if(c)LISTS[k].id=c.id;
    }
  }
}

/* ═══ AUTH ═══ */
async function initAuth(){
  try{
    msalApp=new msal.PublicClientApplication({auth:{clientId:CFG.clientId,authority:CFG.authority,redirectUri:CFG.redirectUri},cache:{cacheLocation:'localStorage',storeAuthStateInCookie:false}});
    await msalApp.initialize();
    const resp=await msalApp.handleRedirectPromise();
    if(resp){accessToken=resp.accessToken;currentUser=resp.account;}
    else{const a=msalApp.getAllAccounts();if(a.length){currentUser=a[0];try{const t=await msalApp.acquireTokenSilent({scopes:CFG.scopes,account:currentUser});accessToken=t.accessToken;}catch{currentUser=null;}}}
    if(currentUser&&accessToken){
      S.screen='dash';
      document.getElementById('userEl').textContent=currentUser.name||currentUser.username;
      await initSP();
      loadCal();
    }
  }catch(err){console.error('Auth error',err);}
  render();
}
async function login(){try{await msalApp.loginRedirect({scopes:CFG.scopes});}catch(e){alert('Login failed: '+e.message);}}
function logout(){msalApp.logoutRedirect();}

/* ═══ CONFIG (Agenda + Attendees) ═══ */
async function getConfig(sid){
  if(!sid||!LISTS.config.id)return{agenda:[...DEF_AGENDA],attendees:null};
  const items=await spItems('config','SeriesId',sid);
  if(items.length&&items[0].fields.AgendaJSON){
    try{const r=JSON.parse(items[0].fields.AgendaJSON);if(Array.isArray(r))return{agenda:r,attendees:null};return{agenda:r.agenda||[...DEF_AGENDA],attendees:r.attendees||null};}catch{}
  }
  return{agenda:[...DEF_AGENDA],attendees:null};
}
async function saveConfig(sid,agenda,attendees){
  if(!sid||!LISTS.config.id)return;
  const items=await spItems('config','SeriesId',sid);
  const json=JSON.stringify({agenda,attendees});
  if(items.length)await spUpd('config',items[0].id,{AgendaJSON:json});
  else await spAdd('config',{Title:sid,SeriesId:sid,AgendaJSON:json});
}
async function saveAgenda(sid,agenda){const c=await getConfig(sid);await saveConfig(sid,agenda,c.attendees);toast('Agenda saved');}
async function saveAttendees(){const sid=S.seriesId||S.prepSeriesId;if(!sid)return;const c=await getConfig(sid);await saveConfig(sid,c.agenda,S.attendees);toast('Attendees saved');}

/* ═══ HEADLINES ═══ */

/* ═══ CALENDAR ═══ */
function classifyFreq(rec){
  if(!rec||!rec.pattern)return'today';
  const t=rec.pattern.type,iv=rec.pattern.interval||1,days=rec.pattern.daysOfWeek||[];
  if(t==='daily')return'daily';
  if(t==='weekly'&&iv===1&&days.length>=4)return'daily';
  if(t==='weekly'&&iv===1)return'weekly';
  if(t==='weekly'&&iv===2)return'fortnightly';
  if(t==='weekly')return'monthly';
  if(t==='absoluteMonthly'||t==='relativeMonthly')return'monthly';
  return'weekly';
}
async function loadCal(){
  S.loadingCal=true;render();
  const now=new Date(),start=new Date(now),end=new Date(now);
  start.setHours(0,0,0,0);end.setMonth(end.getMonth()+1);end.setHours(23,59,59,999);
  const p=new URLSearchParams({startDateTime:start.toISOString(),endDateTime:end.toISOString(),$orderby:'start/dateTime',$top:'200',$select:'id,subject,start,end,attendees,onlineMeetingUrl,seriesMasterId,type,iCalUId'});
  const d=await gGet('/me/calendarView?'+p);
  if(!d||!d.value){S.loadingCal=false;render();return;}

  const sids=new Set();d.value.forEach(ev=>{if(ev.seriesMasterId)sids.add(ev.seriesMasterId);});
  let pats={},sharedIds={};
  try{pats=JSON.parse(localStorage.getItem('mr_pat3')||'{}');sharedIds=JSON.parse(localStorage.getItem('mr_sid3')||'{}');}catch{}
  const toFetch=[...sids].filter(sid=>!pats[sid]||!sharedIds[sid]);
  for(let i=0;i<toFetch.length;i+=4){
    const batch=toFetch.slice(i,i+4);
    await Promise.all(batch.map(async sid=>{try{const m=await gGet('/me/events/'+sid+'?$select=recurrence,iCalUId');if(m){if(m.recurrence)pats[sid]=m.recurrence;if(m.iCalUId)sharedIds[sid]=m.iCalUId;}}catch{}}));
    if(i+4<toFetch.length)await new Promise(r=>setTimeout(r,500));
  }
  try{localStorage.setItem('mr_pat3',JSON.stringify(pats));localStorage.setItem('mr_sid3',JSON.stringify(sharedIds));}catch{}

  S.allMeetings=d.value.map(ev=>{
    const rec=ev.type==='occurrence'||ev.type==='exception'||!!ev.seriesMasterId;
    const localSid=ev.seriesMasterId||(rec?ev.id:null);
    const sid=rec?(sharedIds[localSid]||localSid):(ev.iCalUId||ev.id);
    const st=new Date(ev.start.dateTime+'Z'),en=new Date(ev.end.dateTime+'Z');
    const att=(ev.attendees||[]).map(a=>({name:a.emailAddress.name,email:a.emailAddress.address}));
    return{id:ev.id,subject:ev.subject||'Untitled',start:st,end:en,durMin:Math.round((en-st)/60000),attendees:att,isRec:rec,seriesId:sid,freq:rec?classifyFreq(pats[localSid]):'today',onlineUrl:ev.onlineMeetingUrl||null};
  });
  filterByDate();
  await loadEnabled();
  S.loadingCal=false;render();
}
function filterByDate(){const d=S.viewDate,s=new Date(d),e=new Date(d);s.setHours(0,0,0,0);e.setHours(23,59,59,999);S.meetings=S.allMeetings.filter(m=>m.start>=s&&m.start<=e);}
function navDay(n){S.viewDate=new Date(S.viewDate.getTime()+n*86400000);filterByDate();render();}

  if(!sid||!LISTS.config.id)return;
  if(S.enabledSeries.has(sid)){const items=await spItems('config','SeriesId',sid);if(items.length)await spDel('config',items[0].id);S.enabledSeries.delete(sid);toast('Agenda disabled');}
  else{await spAdd('config',{Title:sid,SeriesId:sid,AgendaJSON:JSON.stringify({agenda:DEF_AGENDA,attendees:null})});S.enabledSeries.add(sid);toast('Agenda enabled');}
  render();
}

function timerStart(){if(tInt||S.screen!=='runner')return;S.timerOn=true;tInt=setInterval(()=>{S.sections[S.curSec].elapsed++;S.elapsed++;timerUI();},1000);render();}
function timerStop(){S.timerOn=false;clearInterval(tInt);tInt=null;render();}
function timerUI(){
  const sec=S.sections[S.curSec],rem=sec.duration*60-sec.elapsed,ov=rem<0,ab=Math.abs(rem);
  const el=document.getElementById('tD'),fl=document.getElementById('tF'),ck=document.getElementById('clockEl'),st=document.getElementById('sbT'+S.curSec);
  const ts=(ov?'-':'')+Math.floor(ab/60)+':'+String(ab%60).padStart(2,'0');
  if(el){el.textContent=ts;el.className='t-disp'+(ov?' over':'');}
  if(fl){const p=Math.min((sec.elapsed/(sec.duration*60))*100,100);fl.style.width=p+'%';fl.className='t-fill'+(ov?' over':p>80?' warn':'');}
  if(ck){const m=Math.floor(S.elapsed/60),s=S.elapsed%60;ck.textContent=m+':'+String(s).padStart(2,'0')+' elapsed';}
  if(st){st.textContent=ts;st.className='sb-time'+(ov?' over':'');}
}

/* ═══ SHARED CALENDAR (Unicrest Leave/Events) ═══ */
const CAL_USER='regan@unicrest.com';
let sharedCalId=null;

async function findSharedCal(){
  if(sharedCalId)return sharedCalId;
  const d=await gGet(`/users/${CAL_USER}/calendars?$select=id,name&$top=20`);
  if(d&&d.value){
    // Look for a non-default calendar (the shared leave/events one)
    const nonDefault=d.value.filter(c=>c.name!=='Calendar');
    if(nonDefault.length)sharedCalId=nonDefault[0].id;
    else if(d.value.length)sharedCalId=d.value[0].id;
    console.log('Shared calendars found:',d.value.map(c=>c.name).join(', '),'using:',sharedCalId);
  }
  return sharedCalId;
}

async function loadCalEvents(weekOffset){
  S.calLoading=true;render();
  const calId=await findSharedCal();
  if(!calId){S.calLoading=false;toast('Shared calendar not found');render();return;}

  // Calculate week start (Monday)
  const now=new Date();
  const day=now.getDay();
  const mon=new Date(now);mon.setDate(now.getDate()-((day+6)%7)+(weekOffset||0)*7);
  mon.setHours(0,0,0,0);
  S.calWeekStart=new Date(mon);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);

  const p=new URLSearchParams({
    startDateTime:mon.toISOString(),endDateTime:sun.toISOString(),
    $orderby:'start/dateTime',$top:'100',
    $select:'subject,start,end,isAllDay,organizer'
  });
  const d=await gGet(`/users/${CAL_USER}/calendars/${calId}/calendarView?${p}`);
  if(d&&d.value){
    S.calEvents=d.value.map(ev=>({
      subject:ev.subject||'',
      start:new Date(ev.start.dateTime+'Z'),
      end:new Date(ev.end.dateTime+'Z'),
      allDay:ev.isAllDay||false,
      organizer:ev.organizer?ev.organizer.emailAddress.name:''
    }));
  } else S.calEvents=[];
  S.calLoading=false;render();
}

function calNavWeek(dir){
  const current=S.calWeekStart||new Date();
  const newStart=new Date(current);newStart.setDate(current.getDate()+dir*7);
  const now=new Date();now.setHours(0,0,0,0);
  const day=now.getDay();const thisMonday=new Date(now);thisMonday.setDate(now.getDate()-((day+6)%7));
  const weekDiff=Math.round((newStart-thisMonday)/(7*86400000));
  loadCalEvents(weekDiff);
}

  let body='<div style="font-family:Arial,sans-serif;max-width:600px">';
  body+=`<h2 style="color:#EF3E42">${esc(mt)}</h2><p style="color:#666">${ds}, ${tm} minutes</p>`;

  const openA=S.actions.filter(a=>!a.done);
  if(openA.length){body+='<h3 style="color:#EF3E42">Open Actions</h3><ul>';openA.forEach(a=>{body+=`<li>${esc(a.text)}${a.owner?' — <strong>'+esc(a.owner)+'</strong>':''}${a.due?' (due '+a.due+')':''}</li>`;});body+='</ul>';}
  if(S.headlines.length){body+='<h3>Headlines</h3><ul>';S.headlines.forEach(h=>{body+=`<li>[${h.status}] ${esc(h.text)}${h.notes?' — '+esc(h.notes):''}</li>`;});body+='</ul>';}
  if(S.ratings.length)body+=`<h3>Rating: ${avgRat()}/10</h3><p style="color:#666">${S.ratings.map(r=>esc(r.by)+': '+r.rating).join(' · ')}</p>`;
  body+='<hr style="border:none;border-top:1px solid #ddd;margin-top:20px"><p style="color:#999;font-size:12px">Meeting Runner · Unicrest Group</p></div>';
  const recipients=att.filter(a=>a.email).map(a=>({emailAddress:{address:a.email,name:a.name}}));
  const btn=document.getElementById('emailBtn');if(btn){btn.textContent='Sending...';btn.disabled=true;}
  const t=await getToken();if(!t)return;
  const r=await fetch(G+'/me/sendMail',{method:'POST',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify({message:{subject:'Meeting Summary: '+mt+' — '+ds,body:{contentType:'HTML',content:body},toRecipients:recipients}})});
  if(r.ok||r.status===202){toast('Email sent to '+recipients.length+' attendees');if(btn){btn.textContent='Sent!';setTimeout(()=>{btn.textContent='Email to attendees';btn.disabled=false;},2000);}}
  else{toast('Email failed');if(btn){btn.textContent='Email to attendees';btn.disabled=false;}}
}

/* ═══ TOAST ═══ */
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

/* ═══ INLINE ACTION FROM HEADLINE ═══ */
function toggleHLAction(id){const el=document.getElementById('hlA_'+id);if(el)el.style.display=el.style.display==='none'?'flex':'none';}
function submitHLAction(id){const t=document.getElementById('hlAT_'+id),o=document.getElementById('hlAO_'+id),d=document.getElementById('hlAD_'+id);if(!t||!t.value.trim())return;addAct(t.value.trim(),o?o.value:'',d?d.value:'',curSecName());t.value='';const el=document.getElementById('hlA_'+id);if(el)el.style.display='none';}

/* ═══════════════════════════════════════
   RENDERERS
   ═══════════════════════════════════════ */
function render(){
  const app=document.getElementById('app'),btn=document.getElementById('hdrBtn'),bk=document.getElementById('bookBtn');
  const sched=S.showScheduler?rScheduler():'';const agEd=S.showAgendaEditor?rAgendaEd():'';
  if(S.screen==='login'){btn.style.display='none';bk.style.display='none';app.innerHTML='<div class="wrap">'+rLogin()+'</div>';}
  else if(S.screen==='dash'){btn.style.display='';btn.textContent='Sign out';btn.className='hdr-btn';btn.onclick=logout;bk.style.display='';app.innerHTML='<div class="wrap">'+rDash()+'</div>'+sched;}
  else if(S.screen==='runner'){btn.style.display='';btn.textContent='End meeting';btn.className='hdr-btn red';btn.onclick=hdrAction;bk.style.display='none';app.innerHTML=rSidebarLayout('runner')+agEd+sched;const n=document.getElementById('sN');if(n)n.value=curSec()[S.curSec].notes||'';timerUI();}
  else if(S.screen==='prep'){btn.style.display='';btn.textContent='\u2190 Dashboard';btn.className='hdr-btn';btn.onclick=backToDash;bk.style.display='none';document.getElementById('clockEl').textContent='';app.innerHTML=rSidebarLayout('prep')+agEd+sched;const n=document.getElementById('sN');if(n)n.value=curSec()[S.curSec].notes||'';}
  else if(S.screen==='summary'){btn.style.display='';btn.textContent='\u2190 Dashboard';btn.className='hdr-btn';btn.onclick=backToDash;bk.style.display='none';document.getElementById('clockEl').textContent='';app.innerHTML='<div class="wrap">'+rSummary()+'</div>';}
}

function rLogin(){return `<div class="login"><div class="login-card"><h2>MEETING <span>RUNNER</span></h2><p>Sign in with Microsoft to sync your calendar.</p><button class="login-btn" onclick="login()"><svg viewBox="0 0 21 21" width="20" height="20" fill="none"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>Sign in with Microsoft</button><div class="tagline">Proven Excellence</div></div></div>`;}

function rDash(){
  if(S.loadingCal)return `<div class="loading"><div class="spinner"></div>Loading calendar...</div>`;
  const vd=S.viewDate,ds=vd.toLocaleDateString('en-NZ',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}),isToday=new Date().toDateString()===vd.toDateString();
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <button class="hdr-btn" style="background:var(--dark);color:var(--white)" onclick="navDay(-1)">\u2190</button>
    <div style="text-align:center"><div style="font-size:14px;font-weight:700">${ds}</div>${!isToday?'<button style="background:none;color:var(--red);font-size:11px;font-weight:700;padding:2px 0;font-family:Arvo,serif" onclick="goToday()">Back to today</button>':'<div style="font-size:11px;color:var(--mid)">Today</div>'}</div>
    <button class="hdr-btn" style="background:var(--dark);color:var(--white)" onclick="navDay(1)">\u2192</button></div>`;
  if(!S.meetings.length)return h+`<div class="empty">No meetings on this day.</div><button class="adhoc-btn" onclick="startAdhoc()">+ Start an ad-hoc meeting</button>`;
  const groups=[{key:'today',label:'One-off',m:[]},{key:'daily',label:'Daily',m:[]},{key:'weekly',label:'Weekly',m:[]},{key:'fortnightly',label:'Fortnightly',m:[]},{key:'monthly',label:'Monthly',m:[]}];
  S.meetings.forEach((m,i)=>{(groups.find(g=>g.key===m.freq)||groups[0]).m.push({...m,idx:i});});
  groups.forEach(g=>{if(!g.m.length)return;h+=`<div class="grp-label">${g.label}<span class="cnt">(${g.m.length})</span></div>`;
    g.m.forEach(m=>{const time=m.start.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit',hour12:true});const n=m.attendees.length;const has=m.isRec&&m.seriesId&&S.enabledSeries.has(m.seriesId);
      h+=`<div class="card click"><div style="display:flex;align-items:flex-start;justify-content:space-between"><div><div style="font-size:14px;font-weight:700">${esc(m.subject)}</div><div style="font-size:12px;color:var(--mid);margin-top:2px">${time} \u00B7 ${m.durMin} min \u00B7 ${n} attendee${n!==1?'s':''}</div></div><span class="badge ${m.isRec?'rec':'one'}">${m.isRec?g.label:'One-off'}</span></div>`;
      if(m.isRec&&m.seriesId){h+=`<div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bg)"><div onclick="toggleEnabled('${esc(m.seriesId)}')" style="cursor:pointer;width:40px;height:22px;border-radius:11px;background:${has?'var(--green)':'var(--bdr)'};position:relative;transition:background .2s;flex-shrink:0"><div style="width:18px;height:18px;border-radius:50%;background:var(--white);position:absolute;top:2px;${has?'right:2px':'left:2px'};transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)"></div></div><span style="font-size:12px;color:${has?'var(--green)':'var(--mid)'}">${has?'Agenda enabled':'Enable agenda'}</span></div>`;}
      if(has){if(isToday)h+=`<button class="start-btn" onclick="startMtg(${m.idx})">Start meeting</button>`;h+=`<button class="start-btn" onclick="prepMtg(${m.idx})" style="background:var(--dark);margin-top:6px">Prepare / View agenda</button>`;}
      h+=`</div>`;});});
  h+=`<button class="adhoc-btn" onclick="startAdhoc()">+ Start an ad-hoc meeting</button>`;return h;
}

/* ═══ SIDEBAR LAYOUT (shared by runner & prep) ═══ */
function rSidebarLayout(mode){
  const secs=curSec(),sec=secs[S.curSec],att=S.attendees;
  const mt=mode==='prep'?(S.prepMeeting?S.prepMeeting.subject:'Prepare'):(S.activeMeeting?S.activeMeeting.subject:'Ad-hoc meeting');
  let sb=`<div class="sidebar"><div class="sb-meeting">${esc(mt)}<small>${mode==='prep'?'Prepare mode':S.activeMeeting&&S.activeMeeting.isRec?'Recurring':'One-off'}</small></div>`;
  secs.forEach((s,i)=>{const isA=i===S.curSec,isDone=s.done;let timeLabel=s.duration+'m';
    if(mode==='runner'&&(isA||isDone)){const rem=s.duration*60-s.elapsed,ov=rem<0,ab=Math.abs(rem);timeLabel=isDone?'Done':(ov?'-':'')+Math.floor(ab/60)+':'+String(ab%60).padStart(2,'0');}
    sb+=`<div class="sb-item ${isA?'active':''} ${isDone?'done':''}" onclick="goSec(${i})"><div class="sn ${isA?'act':isDone?'done':''}">${i+1}</div><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.name)}</span><span class="sb-time${mode==='runner'&&!isDone&&s.duration*60-s.elapsed<0?' over':''}" id="sbT${i}">${timeLabel}</span></div>`;});
  sb+=`<div class="sb-section"><div class="sb-section-label">Attendees</div>${att.map(a=>`<div style="display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--mid);padding:2px 0"><span>${esc(a.name)}</span><button class="a-rm" style="font-size:12px" onclick="rmAttendee('${esc(a.name)}')">&times;</button></div>`).join('')}
    <div style="display:flex;gap:4px;margin-top:6px"><input type="text" id="addAttName" placeholder="Add name..." style="flex:1;padding:4px 6px;border:1px solid var(--bdr);border-radius:4px;font-size:10px" onkeydown="if(event.key==='Enter')addAttendee()"><button class="add-btn" style="padding:4px 8px;font-size:10px" onclick="addAttendee()">+</button></div>
    <button class="sb-edit-btn" onclick="openAgendaEd()">Edit agenda</button></div></div>`;

  let main=`<div class="main">`;
  if(mode==='runner'){main+=`<div class="t-row"><div style="font-size:11px;color:var(--mid)">${sec.duration} min</div><div class="t-disp" id="tD">--:--</div><button class="t-btn" onclick="${S.timerOn?'timerStop()':'timerStart()'}">${S.timerOn?'\u23F8':'\u25B6'}</button><div class="t-bar"><div class="t-fill" id="tF" style="width:0"></div></div></div>`;}
  else{main+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div style="font-size:11px;color:var(--mid)">${sec.duration} min</div></div>`;}
  main+=`<div class="main-title">${esc(sec.name)}</div>`;

  const oo=att.map(a=>`<option value="${esc(a.name)}">${esc(a.name)}</option>`).join('');
  if(sec.type==='checkin')main+=rCheckin();
  else if(sec.type==='calendar')main+=rCalendar();
  else if(sec.type==='headlines')main+=rHeadlines(oo);
  else if(sec.type==='issues')main+=rIssues(oo);
  else if(sec.type==='wrapup')main+=rWrapup(oo);
  else main+=rNotes(oo);

  // Nav
  if(mode==='runner'){const last=S.curSec===secs.length-1;main+=`<div class="main-nav">${S.curSec>0?'<button class="hdr-btn" onclick="prevSec()">\u2190 Back</button>':''}<button class="hdr-btn red" onclick="nextSec()">${last?'Finish':'Next: '+secs[Math.min(S.curSec+1,secs.length-1)].name+' \u2192'}</button></div>`;}
  else{main+=`<div class="main-nav">${S.curSec>0?'<button class="hdr-btn" onclick="goSec('+(S.curSec-1)+')">\u2190 '+secs[S.curSec-1].name+'</button>':''}${S.curSec<secs.length-1?'<button class="hdr-btn" style="background:var(--mid);color:var(--white)" onclick="goSec('+(S.curSec+1)+')">'+secs[S.curSec+1].name+' \u2192</button>':''}<button class="hdr-btn red" onclick="startFromPrep()">Start meeting</button></div>`;}
  main+=`</div>`;
  return `<div class="runner">${sb}${main}</div>`;
}

/* ═══ SECTION RENDERERS ═══ */
function bookBtn(){return `<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="add-btn sec" onclick="openScheduler()" style="font-size:11px;padding:5px 12px">Book a meeting</button></div>`;}

function rCalendar(){
  if(!S.calWeekStart)loadCalEvents(0);
  if(S.calLoading)return `<div class="loading" style="padding:20px"><div class="spinner"></div>Loading calendar...</div>`;

  const ws=S.calWeekStart||new Date();
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);days.push(d);}
  const weekLabel=days[0].toLocaleDateString('en-NZ',{day:'2-digit',month:'short'})+' \u2013 '+days[6].toLocaleDateString('en-NZ',{day:'2-digit',month:'short',year:'numeric'});
  const today=new Date().toDateString();

  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <button class="hdr-btn" style="background:var(--dark);color:var(--white);padding:4px 10px;font-size:11px" onclick="calNavWeek(-1)">\u2190</button>
    <div style="font-size:13px;font-weight:700">${weekLabel}</div>
    <button class="hdr-btn" style="background:var(--dark);color:var(--white);padding:4px 10px;font-size:11px" onclick="calNavWeek(1)">\u2192</button>
  </div>`;

  days.forEach(day=>{
    const dayStr=day.toDateString();
    const isToday=dayStr===today;
    const dayEvents=S.calEvents.filter(ev=>{
      const evDay=ev.start.toDateString();
      return evDay===dayStr;
    });
    const dayLabel=day.toLocaleDateString('en-NZ',{weekday:'short',day:'2-digit',month:'short'});

    h+=`<div style="margin-bottom:8px">
      <div style="font-size:12px;font-weight:700;padding:4px 8px;background:${isToday?'var(--red)':'var(--bg)'};color:${isToday?'var(--white)':'var(--dark)'};border-radius:4px;margin-bottom:4px">${dayLabel}</div>`;

    if(dayEvents.length){
      dayEvents.forEach(ev=>{
        const timeStr=ev.allDay?'All day':ev.start.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit',hour12:true})+' \u2013 '+ev.end.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit',hour12:true});
        h+=`<div style="display:flex;gap:8px;padding:4px 8px;font-size:12px;border-left:3px solid var(--amber);margin-left:8px;margin-bottom:3px">
          <span style="color:var(--mid);min-width:90px">${timeStr}</span>
          <span>${esc(ev.subject)}</span>
        </div>`;
      });
    } else {
      h+=`<div style="font-size:11px;color:var(--bdr);padding:4px 8px;margin-left:8px">No events</div>`;
    }
    h+=`</div>`;
  });
  return h;
}

function rCheckin(){
  const present=presentAtt();
  let h=bookBtn()+`<div class="main-sub">Mark who is present. ${present.length} of ${S.attendees.length} checked in.</div>`;
  S.attendees.forEach(a=>{const c=S.attendance[a.name];h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg);cursor:pointer" onclick="togAtt('${esc(a.name)}')"><div class="a-chk ${c?'done':''}" style="width:22px;height:22px">${c?'&#10003;':''}</div><div style="font-size:14px;${c?'':'opacity:.5'}">${esc(a.name)}</div>${c?'<span style="font-size:10px;color:var(--green);margin-left:auto">Present</span>':'<span style="font-size:10px;color:var(--mid);margin-left:auto">Absent</span>'}</div>`;});
  h+=`<div class="sub-l">Notes</div><textarea class="notes" id="sN" placeholder="Check-in notes..." oninput="updNotes(this.value)"></textarea>`;
  return h;
}

function rNotes(oo){
  const acts=S.actions.filter(a=>a.section===curSecName());
  return bookBtn()+`<div class="sub-l" style="margin-top:0">Notes</div><textarea class="notes" id="sN" placeholder="Notes..." oninput="updNotes(this.value)"></textarea><div class="sub-l">Actions</div>${rActList(acts)}${rAddAct(oo)}`;
}

function rHeadlines(oo){
  const open=S.headlines.filter(h=>h.status==='open'),disc=S.headlines.filter(h=>h.status==='discussed');
  const acts=S.actions.filter(a=>a.section===curSecName());
  let h=bookBtn()+`<div class="main-sub">Discussion points. Anyone can add a headline.</div>`;
  h+=`<div class="add-row" style="margin-bottom:16px"><input type="text" id="hlT" placeholder="Add a headline..." onkeydown="if(event.key==='Enter'){addHL(this.value);this.value='';}"><button class="add-btn" onclick="const i=document.getElementById('hlT');addHL(i.value);i.value='';">+ Headline</button></div>`;
  if(open.length){h+=`<div class="sub-l">Open (${open.length})</div>`;open.forEach(x=>{h+=rHLItem(x,oo);});}
  if(disc.length){h+=`<div class="sub-l">Discussed (${disc.length})</div>`;disc.forEach(x=>{h+=rHLItem(x,oo);});}
  if(!S.headlines.length)h+=`<div style="font-size:13px;color:var(--mid);padding:8px 0">No headlines yet.</div>`;
  h+=`<div class="sub-l" style="margin-top:20px">Actions</div>${rActList(acts)}${rAddAct(oo)}`;
  return h;
}
function rHLItem(hl,oo){return `<div class="hl-item"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px"><div style="flex:1"><div class="hl-text">${esc(hl.text)}</div><div class="hl-meta">Added by ${esc(hl.by)}</div></div><span class="hl-status ${hl.status}" onclick="updHL('${hl.id}',{status:'${hl.status==='open'?'discussed':'open'}'});render();">${hl.status}</span><button class="a-rm" onclick="delHL('${hl.id}')">&times;</button></div><div style="margin-top:6px"><textarea placeholder="Discussion notes..." oninput="updHL('${hl.id}',{notes:this.value})" style="width:100%;min-height:36px;border:1px solid var(--bdr);border-radius:4px;padding:6px 8px;font-size:12px;resize:vertical;font-family:'Arvo',serif">${esc(hl.notes)}</textarea></div><button class="hl-action-btn" onclick="toggleHLAction('${hl.id}')">+ Create action</button><div class="add-row" id="hlA_${hl.id}" style="display:none;margin-top:6px"><input type="text" id="hlAT_${hl.id}" placeholder="Action..." onkeydown="if(event.key==='Enter')submitHLAction('${hl.id}')"><select id="hlAO_${hl.id}"><option value="">Owner</option>${oo}</select><input type="date" id="hlAD_${hl.id}" style="max-width:140px"><button class="add-btn" onclick="submitHLAction('${hl.id}')">Add</button></div></div>`;}

function rIssues(oo){
  let h=bookBtn()+`<div class="main-sub">Identify, Discuss, Solve.</div><div class="sub-l">Issues</div>`;
  if(S.issues.length)S.issues.forEach(i=>{h+=`<div style="padding:10px 0;border-bottom:1px solid var(--bg)"><div style="display:flex;align-items:center;justify-content:space-between;gap:8px"><div style="font-size:13px;font-weight:700;flex:1">${esc(i.title)}</div><span class="ib ${i.status}" onclick="cycleIss('${i.id}')">${i.status}</span><button class="a-rm" onclick="delIss('${i.id}')">&times;</button></div><input type="text" placeholder="Resolution notes..." value="${esc(i.notes)}" oninput="issNotes('${i.id}',this.value)" style="width:100%;border:none;border-bottom:1px solid var(--bg);padding:5px 0;font-size:12px;font-family:'Arvo',serif;margin-top:3px"></div>`;});
  else h+=`<div style="font-size:12px;color:var(--mid);padding:4px 0">No issues yet.</div>`;
  h+=`<div class="add-row"><input type="text" id="iT" placeholder="Raise an issue..." onkeydown="if(event.key==='Enter')addIss()"><button class="add-btn" onclick="addIss()">+ Issue</button></div>`;
  h+=`<div class="sub-l" style="margin-top:20px">Actions</div>${rActList(S.actions)}${rAddAct(oo)}`;
  return h;
}

function rWrapup(oo){
  const openA=S.actions.filter(a=>!a.done),doneA=S.actions.filter(a=>a.done);
  let h=`<div class="main-sub">Review actions, headlines, and rate this meeting.</div>`;
  h+=`<div class="sub-l">Open actions (${openA.length})</div>`;
  if(openA.length)openA.forEach(a=>{h+=`<div class="a-item"><div class="a-chk" onclick="togAct('${a.id}')"></div><div style="flex:1"><div class="a-txt">${esc(a.text)}</div><div class="a-meta">${a.owner?'<span>'+esc(a.owner)+'</span>':''}${a.due?'<span>Due '+a.due+'</span>':''}${a.section?'<span>From: '+esc(a.section)+'</span>':''}</div></div></div>`;});
  else h+=`<div style="font-size:12px;color:var(--mid)">No open actions.</div>`;
  if(doneA.length){h+=`<div class="sub-l">Completed (${doneA.length})</div>`;doneA.forEach(a=>{h+=`<div class="a-item"><div class="a-chk done" onclick="togAct('${a.id}')">&#10003;</div><div style="flex:1"><div class="a-txt dn">${esc(a.text)}</div></div></div>`;});}
  if(S.headlines.length){h+=`<div class="sub-l" style="margin-top:20px">Headlines</div>`;S.headlines.forEach(x=>{h+=`<div style="font-size:12px;margin-bottom:6px"><span class="ib ${x.status}" style="font-size:9px;margin-right:6px">${x.status}</span>${esc(x.text)}${x.notes?' — <span style="color:var(--mid)">'+esc(x.notes)+'</span>':''}</div>`;});}
  // Rating
  const avg=avgRat();
  h+=`<div class="sub-l" style="margin-top:20px">Rate this meeting</div>`;
  if(S.ratings.length)h+=`<div style="background:var(--bg);border-radius:6px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between"><div style="font-size:13px;font-weight:700">Average</div><div style="font-size:24px;font-weight:700;color:${avg>=7?'var(--green)':avg>=5?'var(--amber)':'var(--red)'}">${avg}<span style="font-size:12px;font-weight:400;color:var(--mid)">/10</span></div></div>`;
  S.attendees.forEach(a=>{const r=S.ratings.find(x=>x.by===a.name),rv=r?r.rating:0,pres=S.attendance[a.name];
    h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg)"><div style="min-width:90px;font-size:13px;${pres?'':'opacity:.4'}">${esc(a.name)}</div><div style="display:flex;gap:3px;flex:1">`;
    for(let i=1;i<=10;i++){const sel=i<=rv;h+=`<div onclick="submitRat(${i},'${esc(a.name)}')" style="width:26px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;background:${sel?'var(--red)':'var(--bg)'};color:${sel?'var(--white)':'var(--mid)'}">${i}</div>`;}
    h+=`</div></div>`;});
  return h;
}

function rActList(acts){if(!acts.length)return '<div style="font-size:12px;color:var(--mid);padding:4px 0">No actions yet.</div>';return acts.map(a=>`<div class="a-item"><div class="a-chk ${a.done?'done':''}" onclick="togAct('${a.id}')">${a.done?'&#10003;':''}</div><div style="flex:1"><div class="a-txt ${a.done?'dn':''}">${esc(a.text)}</div><div class="a-meta">${a.owner?'<span>'+esc(a.owner)+'</span>':''}${a.due?'<span>Due '+a.due+'</span>':''}</div></div><button class="a-rm" onclick="delAct('${a.id}')">&times;</button></div>`).join('');}
function rAddAct(oo){const sec=curSecName();return `<div class="add-row"><input type="text" id="aT" placeholder="New action..." onkeydown="if(event.key==='Enter'){const o=document.getElementById('aO'),d=document.getElementById('aD');addAct(this.value,o?o.value:'',d?d.value:'','${esc(sec)}');this.value='';}"><select id="aO"><option value="">Owner</option>${oo}</select><input type="date" id="aD" style="max-width:140px"><button class="add-btn" onclick="const t=document.getElementById('aT'),o=document.getElementById('aO'),d=document.getElementById('aD');if(t.value.trim()){addAct(t.value.trim(),o?o.value:'',d?d.value:'','${esc(sec)}');t.value='';}">+ Action</button></div>`;}

/* ═══ AGENDA EDITOR ═══ */
function rAgendaEd(){
  const types=[{v:'checkin',l:'Check-in'},{v:'calendar',l:'Calendar'},{v:'notes',l:'Notes'},{v:'headlines',l:'Headlines'},{v:'issues',l:'Issues & Actions'},{v:'wrapup',l:'Wrap-up'}];
  let rows=S.editAgenda.map((s,i)=>{const to=types.map(t=>`<option value="${t.v}" ${s.type===t.v?'selected':''}>${t.l}</option>`).join('');
    return `<div class="modal-sec"><div style="display:flex;flex-direction:column;gap:2px;margin-right:4px"><button style="background:none;color:${i===0?'var(--bdr)':'var(--mid)'};font-size:10px;padding:0;line-height:1" onclick="edMove(${i},-1)">\u25B2</button><button style="background:none;color:${i===S.editAgenda.length-1?'var(--bdr)':'var(--mid)'};font-size:10px;padding:0;line-height:1" onclick="edMove(${i},1)">\u25BC</button></div><input type="text" value="${esc(s.name)}" oninput="edName(${i},this.value)"><input type="number" class="dur-input" value="${s.duration}" min="1" max="120" oninput="edDur(${i},this.value)"> min <select onchange="edType(${i},this.value)" style="font-size:11px;padding:4px 6px;border:1px solid var(--bdr);border-radius:4px">${to}</select><button style="color:var(--bdr);background:none;font-size:16px;padding:2px 4px" onclick="edRm(${i})">&times;</button></div>`;}).join('');
  return `<div class="modal-bg" onclick="if(event.target===this)closeAgendaEd()"><div class="modal"><h3>Edit agenda</h3><p style="font-size:12px;color:var(--mid);margin-bottom:12px">Saved for all future meetings in this series.</p>${rows}<div style="display:flex;gap:8px;margin-top:12px"><button class="add-btn sec" onclick="edAdd()">+ Add section</button></div><div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end"><button class="hdr-btn" style="background:var(--bg);color:var(--dark)" onclick="closeAgendaEd()">Cancel</button><button class="add-btn" onclick="edSave()">Save agenda</button></div></div></div>`;
}

/* ═══ SCHEDULER ═══ */
function rScheduler(){
  const totalMin=(S.schedEndHr-S.schedStartHr)*60;const slotW=Math.max(Math.floor(560/((S.schedEndHr-S.schedStartHr)*4)),8);
  // Meeting time from selection
  let meetStart=S.schedSelTime||'',meetEnd='';
  if(meetStart){const sh=parseInt(meetStart.split(':')[0]),sm=parseInt(meetStart.split(':')[1]),em=(sm+S.schedDuration)%60,eh=sh+Math.floor((sm+S.schedDuration)/60);meetEnd=String(eh).padStart(2,'0')+':'+String(em).padStart(2,'0');}
  // Time header
  let hdr='<div style="display:flex;padding-left:100px">';
  for(let h=S.schedStartHr;h<S.schedEndHr;h++)hdr+=`<div style="width:${slotW*4}px;font-size:9px;color:var(--mid);border-left:1px solid var(--bdr);padding:2px 3px">${String(h).padStart(2,'0')}:00</div>`;
  hdr+='</div>';
  // Rows using availabilityView
  let rows='';
  const selStartSlot=meetStart?((parseInt(meetStart.split(':')[0])-S.schedStartHr)*4+Math.floor(parseInt(meetStart.split(':')[1])/15)):null;
  const selSlots=Math.ceil(S.schedDuration/15);
  S.schedAvail.forEach(p=>{
    rows+=`<div class="tl-row"><div class="tl-name">${esc(p.name)}</div><div class="tl-blocks" style="position:relative" onclick="schedClickTime(Math.floor((event.offsetX)/${slotW})*15)">`;
    for(let i=0;i<p.view.length&&i<(S.schedEndHr-S.schedStartHr)*4;i++){
      const c=p.view[i];let cls='';if(c==='2'||c==='3')cls='busy';else if(c==='1')cls='tentative';else if(c==='4')cls='elsewhere';
      rows+=`<div class="tl-slot ${cls}" style="width:${slotW}px;display:inline-block"></div>`;
    }
    if(selStartSlot!==null)rows+=`<div class="tl-sel" style="left:${selStartSlot*slotW}px;width:${selSlots*slotW}px"></div>`;
    rows+=`</div></div>`;
  });

  return `<div class="sched-overlay" onclick="if(event.target===this)closeScheduler()"><div class="sched-panel">
    <div class="sched-hdr"><h3>Book a meeting</h3><button class="a-rm" style="font-size:20px" onclick="closeScheduler()">&times;</button></div>
    <div class="sched-body">
      <div class="sched-field"><label>Subject</label><input type="text" value="${esc(S.schedSubject)}" oninput="S.schedSubject=this.value"></div>
      <div class="sched-field" style="position:relative"><label>Add people</label><input type="text" id="schedSearchInp" placeholder="Search by name or email..." oninput="schedSearch(this.value)" autocomplete="off"><div id="scDD"></div></div>
      <div style="margin-bottom:12px">${S.schedPeople.map(p=>`<span class="sched-chip">${esc(p.name)}<button onclick="schedRmP('${esc(p.email)}')">&times;</button></span>`).join('')}</div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <div class="sched-field" style="flex:1;margin:0"><label>Date</label><input type="date" value="${S.schedDate}" onchange="schedSetDate(this.value)"></div>
        <div class="sched-field" style="width:90px;margin:0"><label>From</label><input type="time" value="${meetStart}" onchange="S.schedSelTime=this.value;render();" style="font-size:13px"></div>
        <div class="sched-field" style="width:90px;margin:0"><label>To</label><input type="time" value="${meetEnd}" readonly style="font-size:13px;background:var(--bg);color:var(--mid)"></div>
        <div class="sched-field" style="width:90px;margin:0"><label>Duration</label><select onchange="S.schedDuration=parseInt(this.value);render()">${[15,30,45,60,90,120].map(d=>`<option value="${d}" ${d===S.schedDuration?'selected':''}>${d} min</option>`).join('')}</select></div>
      </div>
      <label style="font-size:12px;display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:12px"><input type="checkbox" ${S.schedTeams?'checked':''} onchange="S.schedTeams=this.checked"> Include Teams link</label>
      ${S.schedLoading?'<div class="loading" style="padding:20px"><div class="spinner"></div>Loading availability...</div>':`
        ${S.schedPeople.length?`<div class="sub-l">Availability</div><div class="tl-wrap">${hdr}${rows}</div>
          <div style="display:flex;gap:12px;font-size:11px;color:var(--mid);margin-top:4px">
            <span><span style="display:inline-block;width:12px;height:10px;background:#e57373;border-radius:2px;vertical-align:middle"></span> Busy</span>
            <span><span style="display:inline-block;width:12px;height:10px;background:#ffb74d;border-radius:2px;vertical-align:middle"></span> Tentative</span>
            <span><span style="display:inline-block;width:12px;height:10px;background:var(--bg);border-radius:2px;vertical-align:middle;border:1px solid var(--bdr)"></span> Free</span>
          </div>`:'<div style="font-size:13px;color:var(--mid);padding:16px 0">Add people to see availability.</div>'}
      `}
    </div>
    <div class="sched-foot"><button class="hdr-btn" style="background:var(--bg);color:var(--dark)" onclick="closeScheduler()">Cancel</button><button class="add-btn" style="flex:1" onclick="schedBook()">Send invite</button></div>
  </div></div>`;
}

/* ═══ SUMMARY ═══ */
function rSummary(){
  const mt=S.activeMeeting?S.activeMeeting.subject:'Meeting',tm=Math.floor(S.elapsed/60);
  const ts=S.startTime?S.startTime.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit',hour12:true}):'';
  const ds=S.startTime?S.startTime.toLocaleDateString('en-NZ',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}):'';
  const att=S.attendees.map(a=>a.name).join(', ');
  const sH=(S.sections||[]).filter(s=>s.notes).map(s=>`<div class="sum-sec"><h3>${esc(s.name)}</h3><div style="font-size:13px;color:var(--mid);white-space:pre-wrap">${esc(s.notes)}</div></div>`).join('');
  const openA=S.actions.filter(a=>!a.done),doneA=S.actions.filter(a=>a.done);
  const aH=openA.length?openA.map(a=>`<div style="padding:4px 0;font-size:12px;display:flex;gap:8px"><div style="width:6px;height:6px;border-radius:50%;background:var(--red);margin-top:5px;flex-shrink:0"></div><div>${esc(a.text)}${a.owner?' — '+esc(a.owner):''}${a.due?' (due '+a.due+')':''}</div></div>`).join(''):'<div style="font-size:12px;color:var(--mid)">No open actions.</div>';
  const hlH=S.headlines.length?S.headlines.map(h=>`<div style="padding:4px 0;font-size:12px;display:flex;gap:8px"><div style="width:6px;height:6px;border-radius:50%;background:${h.status==='discussed'?'var(--green)':'var(--blue)'};margin-top:5px;flex-shrink:0"></div><div>${esc(h.text)} <span class="ib ${h.status}" style="font-size:9px">${h.status}</span></div></div>`).join(''):'';
  const plain=`${mt}\n${ds} at ${ts}\n${att?'Attendees: '+att+'\n':''}Duration: ${tm} minutes\n\n${(S.sections||[]).filter(s=>s.notes).map(s=>s.name+':\n'+s.notes).join('\n\n')}\n\nOpen actions:\n${openA.map(a=>'• '+a.text+(a.owner?' — '+a.owner:'')+(a.due?' (due '+a.due+')':'')).join('\n')||'None'}${S.ratings.length?'\n\nRating: '+avgRat()+'/10':''}`;

  return `<div class="card" style="margin-bottom:12px"><div style="display:flex;align-items:center;justify-content:space-between"><div style="font-size:16px;font-weight:700;color:var(--red)">Meeting Summary</div><div style="font-size:12px;color:var(--mid)">${tm} min</div></div><div style="font-size:12px;color:var(--mid);margin-top:4px">${ds}${ts?' at '+ts:''}${att?'<br>Attendees: '+att:''}</div></div>
  ${sH?'<div class="card">'+sH+'</div>':''}
  <div class="card"><div class="sum-sec"><h3>Open actions</h3>${aH}</div>${doneA.length?'<div class="sum-sec"><h3>Completed</h3>'+doneA.map(a=>'<div style="padding:4px 0;font-size:12px;display:flex;gap:8px"><div style="width:6px;height:6px;border-radius:50%;background:var(--green);margin-top:5px;flex-shrink:0"></div><div style="text-decoration:line-through;opacity:.5">'+esc(a.text)+'</div></div>').join('')+'</div>':''}</div>
  ${hlH?'<div class="card"><div class="sum-sec"><h3>Headlines</h3>'+hlH+'</div></div>':''}
  ${S.ratings.length?'<div class="card"><div class="sum-sec"><h3>Meeting rating: '+avgRat()+'/10</h3><div style="font-size:12px;color:var(--mid)">'+S.ratings.map(r=>esc(r.by)+': '+r.rating).join(' · ')+'</div></div></div>':''}
  <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap" id="sT" data-plain="${esc(plain)}">
    <button class="add-btn" id="cBtn" onclick="copySummary()" style="flex:1">Copy summary</button>
    <button class="add-btn" id="emailBtn" onclick="emailSummary()" style="flex:1;background:var(--blue)">Email to attendees</button>
    <button class="add-btn" onclick="window.print()" style="flex:1;background:var(--dark)">Print</button>
    <button class="add-btn" onclick="backToDash()" style="flex:1;background:var(--mid)">\u2190 Dashboard</button>
  </div>`;
}
function copySummary(){const el=document.getElementById('sT');navigator.clipboard.writeText(el?el.getAttribute('data-plain'):'').then(()=>{const b=document.getElementById('cBtn');if(b){b.textContent='Copied!';setTimeout(()=>{b.textContent='Copy summary'},1500);}});}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

/* ═══ INIT ═══ */
initAuth();
</script>
