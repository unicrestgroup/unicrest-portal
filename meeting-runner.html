<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Runner | Unicrest Group</title>
<link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.0/lib/msal-browser.min.js"></script>
<style>
:root {
  --red:#EF3E42;--dark:#231F20;--mid:#464749;--bg:#EEEEEE;--white:#fff;
  --green:#2E7D32;--amber:#F57F17;--blue:#1565C0;
  --lr:#FFEBEE;--lg:#E8F5E9;--la:#FFF8E1;--lb:#E3F2FD;
  --bdr:#D5D5D5;--sh:0 2px 8px rgba(0,0,0,.08);--r:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Arvo',serif;background:var(--bg);color:var(--dark);min-height:100vh}
button{font-family:'Arvo',serif;cursor:pointer;border:none}
input,textarea,select{font-family:'Arvo',serif}

.hdr{background:linear-gradient(135deg,var(--dark) 0%,#2a2526 60%,var(--mid) 100%);color:var(--white);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr h1{font-size:17px;font-weight:700;letter-spacing:.5px}
.hdr h1 span{color:var(--red)}
.hdr-r{display:flex;align-items:center;gap:10px;font-size:12px}
.hdr-btn{background:rgba(255,255,255,.12);color:var(--white);padding:6px 13px;border-radius:6px;font-size:12px;font-weight:700;transition:background .2s}
.hdr-btn:hover{background:rgba(255,255,255,.22)}
.hdr-btn.red{background:var(--red)}
.hdr-btn.red:hover{background:#d63336}
.wrap{max-width:700px;margin:0 auto;padding:16px 14px 100px}

.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:75vh;text-align:center}
.login-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:40px 32px;width:100%;max-width:400px}
.login-card h2{font-size:22px;margin-bottom:4px}
.login-card h2 span{color:var(--red)}
.login-card p{font-size:13px;color:var(--mid);margin-bottom:24px}
.login-btn{background:var(--dark);color:var(--white);padding:12px 24px;border-radius:6px;font-size:14px;font-weight:700;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s}
.login-btn:hover{background:var(--mid)}
.tagline{font-size:11px;color:var(--mid);margin-top:16px;font-style:italic}

.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;margin-bottom:10px}
.card.click{cursor:pointer;transition:box-shadow .2s}
.card.click:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.badge{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.badge.rec{background:var(--lb);color:var(--blue)}
.badge.one{background:var(--bg);color:var(--mid)}

.day-label{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sync-note{font-size:11px;font-weight:400;color:var(--mid)}
.cf-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--bg)}
.cf-label{font-size:11px;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.cf-item{display:flex;align-items:center;gap:7px;font-size:12px;margin-bottom:3px}
.cf-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0}

.start-btn{background:var(--red);color:var(--white);text-align:center;padding:9px;border-radius:6px;font-size:13px;font-weight:700;margin-top:10px;width:100%;transition:background .2s}
.start-btn:hover{background:#d63336}
.adhoc-btn{border:1px dashed var(--bdr);border-radius:var(--r);padding:12px;text-align:center;font-size:13px;color:var(--mid);margin-top:6px;background:none;width:100%;transition:all .2s}
.adhoc-btn:hover{border-color:var(--red);color:var(--red)}

.sec-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bg)}
.sec-hdr h2{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.sn{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:var(--white);background:var(--dark)}
.sn.act{background:var(--red)}
.sn.done{background:var(--green)}
.sec-body{padding:14px 16px}

.t-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.t-disp{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;min-width:64px;text-align:center}
.t-disp.over{color:var(--red)}
.t-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--dark);color:var(--white);transition:background .2s}
.t-btn:hover{background:var(--mid)}
.t-lbl{color:var(--mid);font-size:11px}
.t-bar{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.t-fill{height:100%;background:var(--green);border-radius:2px;transition:width 1s linear,background .3s}
.t-fill.warn{background:var(--amber)}
.t-fill.over{background:var(--red)}

textarea.notes{width:100%;min-height:70px;border:1px solid var(--bdr);border-radius:6px;padding:10px 12px;font-size:13px;resize:vertical;line-height:1.5}
textarea.notes:focus{outline:2px solid var(--red);border-color:transparent}
.sub-l{font-size:11px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px}

.a-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--bg)}
.a-item:last-child{border-bottom:none}
.a-chk{width:20px;height:20px;border:2px solid var(--bdr);border-radius:4px;flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:11px}
.a-chk.done{background:var(--green);border-color:var(--green);color:white}
.a-chk.cf{border-color:var(--amber)}
.a-txt{font-size:13px;line-height:1.4;flex:1}
.a-txt.dn{text-decoration:line-through;opacity:.5}
.a-meta{font-size:11px;color:var(--mid);margin-top:1px}
.a-meta span{margin-right:10px}
.cf-badge{font-size:9px;background:var(--la);color:var(--amber);padding:1px 6px;border-radius:8px;font-weight:700;margin-left:4px}
.a-rm{background:none;color:var(--bdr);font-size:16px;padding:2px 4px;line-height:1}
.a-rm:hover{color:var(--red)}

.add-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.add-row input,.add-row select{padding:7px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:12px;background:var(--white)}
.add-row input{flex:1;min-width:100px}
.add-row input:focus,.add-row select:focus{outline:2px solid var(--red);border-color:transparent}
.add-btn{background:var(--red);color:var(--white);padding:7px 14px;border-radius:6px;font-size:12px;font-weight:700;transition:background .2s;white-space:nowrap}
.add-btn:hover{background:#d63336}

.issue-item{padding:10px 0;border-bottom:1px solid var(--bg)}
.issue-item:last-child{border-bottom:none}
.issue-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.issue-title{font-size:13px;font-weight:700;flex:1}
.ib{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;cursor:pointer}
.ib.open{background:var(--lr);color:var(--red)}
.ib.discussing{background:var(--la);color:var(--amber)}
.ib.solved{background:var(--lg);color:var(--green)}

.bot{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--bdr);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;z-index:100}
.dots{display:flex;gap:6px;align-items:center}
.dot{width:10px;height:10px;border-radius:50%;background:var(--bdr);cursor:pointer;transition:all .2s}
.dot.act{background:var(--red);transform:scale(1.3)}
.dot.done{background:var(--green)}
.nav-btns{display:flex;gap:8px}

.sum-sec{margin-bottom:16px}
.sum-sec h3{font-size:13px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sum-notes{font-size:13px;line-height:1.6;color:var(--mid);white-space:pre-wrap}
.sum-act{padding:4px 0;font-size:12px;display:flex;gap:8px}
.sum-dot{width:6px;height:6px;border-radius:50%;background:var(--red);margin-top:5px;flex-shrink:0}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--mid);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--mid);font-size:14px}

@media print{.hdr,.bot{display:none}.wrap{padding:0;max-width:100%}}
@media(max-width:500px){.hdr h1{font-size:15px}.wrap{padding:12px 10px 90px}.add-row{flex-direction:column}.add-row input,.add-row select{min-width:100%}}
</style>
</head>
<body>
<div class="hdr">
  <h1>MEETING <span>RUNNER</span></h1>
  <div class="hdr-r">
    <span id="clockEl" style="color:rgba(255,255,255,.6);font-variant-numeric:tabular-nums"></span>
    <span id="userEl" style="color:rgba(255,255,255,.6)"></span>
    <button class="hdr-btn" id="hdrBtn" style="display:none"></button>
  </div>
</div>
<div class="wrap" id="app"></div>

<script>
/* ═══ CONFIG ═══ */
const CONFIG = {
  clientId: 'c6595fee-5861-474a-b604-4487ac361580',
  authority: 'https://login.microsoftonline.com/8c8bc073-973e-4ddf-9384-38498e8aa324',
  redirectUri: window.location.origin + window.location.pathname,
  scopes: ['User.Read','Calendars.ReadWrite','Mail.Send']
};
const GRAPH = 'https://graph.microsoft.com/v1.0';

let msalApp, accessToken, currentUser;

/* ═══ AGENDA TEMPLATE ═══ */
const AGENDA = [
  { name:'Check-in', duration:5*60, icon:'\u{1F44B}' },
  { name:'Updates', duration:10*60, icon:'\u{1F4CA}' },
  { name:'Issues & Actions', duration:35*60, icon:'\u{1F525}' },
  { name:'Wrap-up', duration:5*60, icon:'\u2705' }
];

/* ═══ STATE ═══ */
let S = {
  screen:'login',
  meetings:[],
  loadingCal:false,
  activeMeeting:null,
  seriesId:null,
  curSec:0,
  sections:[],
  actions:[],
  issues:[],
  timerOn:false,
  elapsed:0,
  startTime:null
};
let tInt = null;

/* ═══ CARRY-FORWARD STORAGE ═══ */
const SK = 'meetrunner_v1';
function hist()   { try { return JSON.parse(localStorage.getItem(SK))||{}; } catch { return {}; } }
function saveHist(h) { localStorage.setItem(SK, JSON.stringify(h)); }
function getCF(sid) {
  if (!sid) return [];
  const h = hist(), last = h[sid];
  return (last && last.actions) ? last.actions.filter(a => !a.done) : [];
}
function saveCF(sid, actions) {
  if (!sid) return;
  const h = hist();
  h[sid] = { actions, at: new Date().toISOString() };
  saveHist(h);
}

/* ═══ AUTH ═══ */
async function initAuth() {
  try {
    if (typeof msal === 'undefined') { showErr('MSAL library failed to load. Check your internet connection.'); return; }
    msalApp = new msal.PublicClientApplication({
      auth: { clientId:CONFIG.clientId, authority:CONFIG.authority, redirectUri:CONFIG.redirectUri },
      cache: { cacheLocation:'localStorage', storeAuthStateInCookie:false }
    });
    await msalApp.initialize();
    const resp = await msalApp.handleRedirectPromise();
    if (resp) { accessToken=resp.accessToken; currentUser=resp.account; }
    else {
      const accts = msalApp.getAllAccounts();
      if (accts.length) {
        currentUser = accts[0];
        try { const t = await msalApp.acquireTokenSilent({scopes:CONFIG.scopes, account:currentUser}); accessToken=t.accessToken; }
        catch { currentUser=null; }
      }
    }
    if (currentUser && accessToken) {
      S.screen='dash';
      document.getElementById('userEl').textContent = currentUser.name||currentUser.username;
      loadCal();
    }
    render();
  } catch(err) {
    console.error('Auth init error:', err);
    showErr('Auth error: ' + err.message);
    S.screen='login';
    render();
  }
}
function showErr(msg) {
  const app=document.getElementById('app');
  app.innerHTML='<div style="background:var(--lr);color:var(--red);padding:14px 16px;border-radius:var(--r);margin:20px 0;font-size:13px"><strong>Error:</strong> '+e(msg)+'</div>' + rLogin();
}

async function login() { try { await msalApp.loginRedirect({scopes:CONFIG.scopes}); } catch(e) { alert('Login failed: '+e.message); } }
function logout() { msalApp.logoutRedirect(); }

async function getToken() {
  try { const r=await msalApp.acquireTokenSilent({scopes:CONFIG.scopes, account:currentUser}); accessToken=r.accessToken; return accessToken; }
  catch { await msalApp.acquireTokenRedirect({scopes:CONFIG.scopes}); return null; }
}

async function gGet(url) {
  const t=await getToken(); if(!t) return null;
  const r=await fetch(GRAPH+url, {headers:{Authorization:'Bearer '+t}});
  if(!r.ok){console.error('Graph',r.status);return null;}
  return r.json();
}

/* ═══ CALENDAR ═══ */
async function loadCal() {
  S.loadingCal=true; render();
  const now=new Date();
  const sod=new Date(now); sod.setHours(0,0,0,0);
  const eod=new Date(now); eod.setHours(23,59,59,999);
  const p=new URLSearchParams({
    startDateTime:sod.toISOString(), endDateTime:eod.toISOString(),
    $orderby:'start/dateTime', $top:'50',
    $select:'id,subject,start,end,attendees,onlineMeetingUrl,seriesMasterId,type'
  });
  const d=await gGet('/me/calendarView?'+p);
  S.loadingCal=false;
  if(d&&d.value){
    S.meetings=d.value.map(ev=>{
      const rec=ev.type==='occurrence'||ev.type==='exception'||!!ev.seriesMasterId;
      const sid=ev.seriesMasterId||(rec?ev.id:null);
      const st=new Date(ev.start.dateTime+'Z');
      const en=new Date(ev.end.dateTime+'Z');
      const att=(ev.attendees||[]).map(a=>({name:a.emailAddress.name,email:a.emailAddress.address}));
      return {
        id:ev.id, subject:ev.subject||'Untitled', start:st, end:en,
        durMin:Math.round((en-st)/60000), attendees:att,
        isRec:rec, seriesId:sid,
        onlineUrl:ev.onlineMeetingUrl||null,
        cf: rec ? getCF(sid) : []
      };
    });
  }
  render();
}

/* ═══ TIMER ═══ */
function timerStart() {
  if(tInt) return; S.timerOn=true;
  tInt=setInterval(()=>{ S.sections[S.curSec].elapsed++; S.elapsed++; timerUI(); },1000);
  render();
}
function timerStop() { S.timerOn=false; clearInterval(tInt); tInt=null; render(); }
function timerUI() {
  const sec=S.sections[S.curSec];
  const el=document.getElementById('tD'), fl=document.getElementById('tF'), ck=document.getElementById('clockEl');
  if(!el) return;
  const rem=sec.duration-sec.elapsed, ov=rem<0, ab=Math.abs(rem);
  el.textContent=(ov?'-':'')+Math.floor(ab/60)+':'+String(ab%60).padStart(2,'0');
  el.className='t-disp'+(ov?' over':'');
  if(fl){const p=Math.min((sec.elapsed/sec.duration)*100,100);fl.style.width=p+'%';fl.className='t-fill'+(ov?' over':p>80?' warn':'');}
  if(ck){const m=Math.floor(S.elapsed/60),s=S.elapsed%60;ck.textContent=m+':'+String(s).padStart(2,'0')+' elapsed';}
}

/* ═══ NAVIGATION ═══ */
function goSec(i){if(i<0||i>=S.sections.length)return;timerStop();S.curSec=i;render();window.scrollTo({top:0,behavior:'smooth'});}
function nextSec(){S.sections[S.curSec].done=true;timerStop();if(S.curSec<S.sections.length-1){S.curSec++;render();}else endMeeting();window.scrollTo({top:0,behavior:'smooth'});}
function prevSec(){if(S.curSec>0){timerStop();S.curSec--;render();window.scrollTo({top:0,behavior:'smooth'});}}

/* ═══ ACTIONS ═══ */
function addAction(){
  const t=document.getElementById('aT'),o=document.getElementById('aO'),d=document.getElementById('aD');
  if(!t||!t.value.trim())return;
  S.actions.push({id:Date.now(),text:t.value.trim(),owner:o?o.value:'',due:d?d.value:'',done:false,carried:false,section:S.curSec});
  t.value='';if(d)d.value='';render();t.focus();
}
function togAction(id){const a=S.actions.find(x=>x.id===id);if(a)a.done=!a.done;render();}
function rmAction(id){S.actions=S.actions.filter(x=>x.id!==id);render();}

/* ═══ ISSUES ═══ */
function addIssue(){
  const t=document.getElementById('iT');if(!t||!t.value.trim())return;
  S.issues.push({id:Date.now(),title:t.value.trim(),status:'open',notes:''});
  t.value='';render();t.focus();
}
function cycleI(id){const i=S.issues.find(x=>x.id===id);if(!i)return;const o=['open','discussing','solved'];i.status=o[(o.indexOf(i.status)+1)%o.length];render();}
function iNotes(id,v){const i=S.issues.find(x=>x.id===id);if(i)i.notes=v;}
function rmIssue(id){S.issues=S.issues.filter(x=>x.id!==id);render();}

/* ═══ MEETING LIFECYCLE ═══ */
function startMtg(idx){
  const m = idx!==undefined ? S.meetings[idx] : null;
  S.activeMeeting=m; S.seriesId=m?m.seriesId:null;
  S.curSec=0; S.sections=AGENDA.map(a=>({...a,notes:'',elapsed:0,done:false}));
  S.issues=[]; S.elapsed=0; S.startTime=new Date(); S.timerOn=false;
  const cf=m?m.cf:[];
  S.actions=cf.map(a=>({id:Date.now()+Math.random()*1000|0,text:a.text,owner:a.owner||'',due:a.due||'',done:false,carried:true,section:2}));
  S.screen='runner'; render();
}
function startAdhoc(){S.activeMeeting=null;S.seriesId=null;startMtg();}

function endMeeting(){
  timerStop(); S.sections[S.curSec].done=true;
  if(S.seriesId) saveCF(S.seriesId, S.actions.map(a=>({text:a.text,owner:a.owner,due:a.due,done:a.done})));
  S.screen='summary'; render();
}
function backToDash(){timerStop();S.screen='dash';document.getElementById('clockEl').textContent='';loadCal();}

function hdrAction(){
  if(S.screen==='runner'){if(confirm('End this meeting and see the summary?'))endMeeting();}
  else if(S.screen==='summary')backToDash();
}
function updNotes(v){S.sections[S.curSec].notes=v;}

/* ═══ RENDER ═══ */
function render(){
  const app=document.getElementById('app'), btn=document.getElementById('hdrBtn');
  if(S.screen==='login'){btn.style.display='none';app.innerHTML=rLogin();}
  else if(S.screen==='dash'){btn.style.display='';btn.textContent='Sign out';btn.className='hdr-btn';btn.onclick=logout;app.innerHTML=rDash();}
  else if(S.screen==='runner'){
    btn.style.display='';btn.textContent='End meeting';btn.className='hdr-btn red';btn.onclick=hdrAction;
    app.innerHTML=rRunner();
    const na=document.getElementById('sN');if(na)na.value=S.sections[S.curSec].notes;
    timerUI();
  }
  else if(S.screen==='summary'){btn.style.display='';btn.textContent='\u2190 Dashboard';btn.className='hdr-btn';btn.onclick=backToDash;document.getElementById('clockEl').textContent='';app.innerHTML=rSummary();}
}

function rLogin(){
  return `<div class="login"><div class="login-card">
    <h2>MEETING <span>RUNNER</span></h2>
    <p>Run structured meetings with your team. Sign in with Microsoft to sync your calendar.</p>
    <button class="login-btn" onclick="login()">
      <svg viewBox="0 0 21 21" width="20" height="20" fill="none"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
      Sign in with Microsoft
    </button>
    <div class="tagline">Proven Excellence</div>
  </div></div>`;
}

function rDash(){
  if(S.loadingCal)return `<div class="loading"><div class="spinner"></div>Loading your calendar...</div>`;
  const now=new Date();
  const ds=now.toLocaleDateString('en-NZ',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  if(!S.meetings.length) return `<div class="day-label">${ds}</div><div class="empty">No meetings on your calendar today.</div><button class="adhoc-btn" onclick="startAdhoc()">+ Start an ad-hoc meeting</button>`;

  const cards=S.meetings.map((m,i)=>{
    const time=m.start.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit',hour12:true});
    const n=m.attendees.length;
    let cfH='';
    if(m.cf.length){
      cfH=`<div class="cf-section"><div class="cf-label">Carry-forward actions (${m.cf.length})</div>
        ${m.cf.map(a=>`<div class="cf-item"><div class="cf-dot"></div>${e(a.text)}${a.owner?' \u2014 <span style="color:var(--mid)">'+e(a.owner)+'</span>':''}</div>`).join('')}</div>`;
    }
    return `<div class="card click">
      <div style="display:flex;align-items:flex-start;justify-content:space-between">
        <div><div style="font-size:14px;font-weight:700">${e(m.subject)}</div>
        <div style="font-size:12px;color:var(--mid);margin-top:2px">${time} \u00B7 ${m.durMin} min \u00B7 ${n} attendee${n!==1?'s':''}</div></div>
        <span class="badge ${m.isRec?'rec':'one'}">${m.isRec?'Recurring':'One-off'}</span>
      </div>${cfH}
      <button class="start-btn" onclick="startMtg(${i})">Start meeting</button>
    </div>`;
  }).join('');

  return `<div class="day-label">${ds}<span class="sync-note">Synced from Outlook</span></div>${cards}<button class="adhoc-btn" onclick="startAdhoc()">+ Start an ad-hoc meeting</button>`;
}

function rRunner(){
  const sec=S.sections[S.curSec], isI=S.curSec===2, isW=S.curSec===3;
  const mt=S.activeMeeting?S.activeMeeting.subject:'Ad-hoc meeting';
  const att=S.activeMeeting?S.activeMeeting.attendees:[];
  const oo=att.map(a=>`<option value="${e(a.name)}">${e(a.name)}</option>`).join('');
  const shown=isI||isW?S.actions:S.actions.filter(a=>a.section===S.curSec);
  const aH=rActions(shown,oo,!isW);
  let iH=''; if(isI) iH=rIssues();

  const dots=S.sections.map((s,i)=>`<div class="dot ${i===S.curSec?'act':s.done?'done':''}" onclick="goSec(${i})" title="${s.name}"></div>`).join('');
  const last=S.curSec===S.sections.length-1;

  return `
    <div class="card" style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:15px;font-weight:700">${e(mt)}</div>
      <div style="font-size:12px;color:var(--mid)">${S.activeMeeting&&S.activeMeeting.isRec?'Recurring':'One-off'}</div>
    </div>
    <div class="sec-card">
      <div class="sec-hdr">
        <h2><span class="sn act">${S.curSec+1}</span>${sec.icon} ${sec.name}</h2>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="t-lbl">${sec.duration/60} min</div>
          <div class="t-disp" id="tD">--:--</div>
          <button class="t-btn" onclick="${S.timerOn?'timerStop()':'timerStart()'}">${S.timerOn?'\u23F8':'\u25B6'}</button>
        </div>
      </div>
      <div class="sec-body">
        <div class="t-bar"><div class="t-fill" id="tF" style="width:0"></div></div>
        ${isI?`
          <div class="sub-l">Issues (IDS)</div>${iH}
          <div class="add-row"><input type="text" id="iT" placeholder="Raise an issue..." onkeydown="if(event.key==='Enter')addIssue()"><button class="add-btn" onclick="addIssue()">+ Issue</button></div>
          <div style="margin-top:16px;border-top:1px solid var(--bg);padding-top:12px"><div class="sub-l" style="margin-top:0">Actions</div>${aH}</div>
        `:`
          <textarea class="notes" id="sN" placeholder="Notes for this section..." oninput="updNotes(this.value)"></textarea>
          <div class="sub-l">${isW?'All actions':'Actions'}</div>${aH}
        `}
      </div>
    </div>
    <div class="bot"><div class="dots">${dots}</div><div class="nav-btns">
      ${S.curSec>0?'<button class="hdr-btn" onclick="prevSec()">\u2190 Back</button>':''}
      <button class="hdr-btn red" onclick="nextSec()">${last?'Finish':'Next \u2192'}</button>
    </div></div>`;
}

function rActions(acts,oo,showAdd){
  if(!acts.length&&!showAdd)return '<div style="font-size:12px;color:var(--mid);padding:4px 0">No actions.</div>';
  const items=acts.map(a=>`
    <div class="a-item">
      <div class="a-chk ${a.done?'done':''} ${a.carried&&!a.done?'cf':''}" onclick="togAction(${a.id})">${a.done?'\u2713':''}</div>
      <div style="flex:1">
        <div class="a-txt ${a.done?'dn':''}">${e(a.text)}${a.carried?'<span class="cf-badge">Carry-forward</span>':''}</div>
        <div class="a-meta">${a.owner?'<span>\u{1F464} '+e(a.owner)+'</span>':''}${a.due?'<span>\u{1F4C5} '+a.due+'</span>':''}</div>
      </div>
      <button class="a-rm" onclick="rmAction(${a.id})">&times;</button>
    </div>`).join('');
  const add=showAdd?`<div class="add-row">
    <input type="text" id="aT" placeholder="New action..." onkeydown="if(event.key==='Enter')addAction()">
    <select id="aO"><option value="">Owner</option>${oo}</select>
    <input type="date" id="aD" style="max-width:140px">
    <button class="add-btn" onclick="addAction()">+ Action</button></div>`:'';
  return items+add;
}

function rIssues(){
  if(!S.issues.length)return '<div style="font-size:12px;color:var(--mid);padding:4px 0">No issues raised yet.</div>';
  return S.issues.map(i=>`
    <div class="issue-item"><div class="issue-top">
      <div class="issue-title">${e(i.title)}</div>
      <span class="ib ${i.status}" onclick="cycleI(${i.id})">${i.status}</span>
      <button class="a-rm" onclick="rmIssue(${i.id})">&times;</button>
    </div>
    <input type="text" placeholder="Resolution notes..." value="${e(i.notes)}" oninput="iNotes(${i.id},this.value)"
      style="width:100%;border:none;border-bottom:1px solid var(--bg);padding:5px 0;font-size:12px;font-family:'Arvo',serif;margin-top:3px">
    </div>`).join('');
}

function rSummary(){
  const mt=S.activeMeeting?S.activeMeeting.subject:'Ad-hoc meeting';
  const tm=Math.floor(S.elapsed/60);
  const ts=S.startTime?S.startTime.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit',hour12:true}):'';
  const ds=S.startTime?S.startTime.toLocaleDateString('en-NZ',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}):'';
  const att=S.activeMeeting?S.activeMeeting.attendees.map(a=>a.name).join(', '):'';

  const sH=S.sections.filter(s=>s.notes).map(s=>`<div class="sum-sec"><h3>${s.icon} ${s.name}</h3><div class="sum-notes">${e(s.notes)}</div></div>`).join('');
  const aH=S.actions.length?S.actions.map(a=>`<div class="sum-act"><div class="sum-dot" style="${a.done?'background:var(--green)':''}"></div><div><span style="${a.done?'text-decoration:line-through;opacity:.5':''}">${e(a.text)}</span>${a.owner?' \u2014 '+e(a.owner):''}${a.due?' (due '+a.due+')':''}</div></div>`).join(''):'<div style="font-size:12px;color:var(--mid)">No actions recorded.</div>';
  const iH=S.issues.length?S.issues.map(i=>`<div class="sum-act"><div class="sum-dot" style="background:${i.status==='solved'?'var(--green)':i.status==='discussing'?'var(--amber)':'var(--red)'}"></div><div><span style="font-weight:700">${e(i.title)}</span> <span class="ib ${i.status}">${i.status}</span>${i.notes?'<div style="font-size:11px;color:var(--mid);margin-top:1px">'+e(i.notes)+'</div>':''}</div></div>`).join(''):'';

  const pSec=S.sections.filter(s=>s.notes).map(s=>s.name+':\n'+s.notes).join('\n\n');
  const pAct=S.actions.map(a=>'\u2022 '+a.text+(a.owner?' \u2014 '+a.owner:'')+(a.due?' (due '+a.due+')':'')).join('\n');
  const pIss=S.issues.map(i=>'\u2022 ['+i.status.toUpperCase()+'] '+i.title+(i.notes?': '+i.notes:'')).join('\n');
  const plain=`${mt}\n${ds}\n${att?'Attendees: '+att+'\n':''}Duration: ${tm} minutes\n\n${pSec}\n\nActions:\n${pAct||'None'}\n${S.issues.length?'\nIssues:\n'+pIss:''}`;

  return `<div class="sec-card">
    <div class="sec-hdr" style="cursor:default"><h2 style="color:var(--red)">Meeting Summary</h2><div style="font-size:12px;color:var(--mid)">${tm} min</div></div>
    <div class="sec-body" id="sT" data-plain="${e(plain)}">
      <div style="margin-bottom:14px"><div style="font-size:17px;font-weight:700">${e(mt)}</div>
      <div style="font-size:12px;color:var(--mid);margin-top:3px">${ds}${ts?' at '+ts:''}${att?'<br>Attendees: '+att:''}</div></div>
      ${sH}
      <div class="sum-sec"><h3>Actions</h3>${aH}</div>
      ${S.issues.length?'<div class="sum-sec"><h3>Issues</h3>'+iH+'</div>':''}
    </div></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="add-btn" id="cBtn" onclick="copySummary()" style="flex:1">Copy summary</button>
      <button class="add-btn" onclick="window.print()" style="flex:1;background:var(--dark)">Print</button>
      <button class="add-btn" onclick="backToDash()" style="flex:1;background:var(--mid)">\u2190 Dashboard</button>
    </div>`;
}

function copySummary(){
  const el=document.getElementById('sT');
  navigator.clipboard.writeText(el?el.getAttribute('data-plain'):'').then(()=>{
    const b=document.getElementById('cBtn');if(b){b.textContent='Copied!';setTimeout(()=>{b.textContent='Copy summary'},1500);}
  });
}

function e(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

/* ═══ INIT ═══ */
render();
initAuth();
</script>
</body>
</html>
