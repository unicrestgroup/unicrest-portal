<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Runner | Unicrest Group</title>
<link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.0/lib/msal-browser.min.js"></script>
<style>
:root{
  --red:#EF3E42;--dark:#231F20;--mid:#464749;--bg:#EEEEEE;--white:#fff;
  --green:#2E7D32;--amber:#F57F17;--blue:#1565C0;
  --lr:#FFEBEE;--lg:#E8F5E9;--la:#FFF8E1;--lb:#E3F2FD;
  --bdr:#D5D5D5;--sh:0 2px 8px rgba(0,0,0,.08);--r:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Arvo',serif;background:var(--bg);color:var(--dark);min-height:100vh;overflow-x:hidden}
button{font-family:'Arvo',serif;cursor:pointer;border:none}
input,textarea,select{font-family:'Arvo',serif}

/* Header */
.hdr{background:linear-gradient(135deg,var(--dark) 0%,#2a2526 60%,var(--mid) 100%);color:var(--white);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:200;height:46px}
.hdr h1{font-size:16px;font-weight:700;letter-spacing:.5px}
.hdr h1 span{color:var(--red)}
.hdr-r{display:flex;align-items:center;gap:10px;font-size:12px}
.hdr-btn{background:rgba(255,255,255,.12);color:var(--white);padding:5px 12px;border-radius:5px;font-size:11px;font-weight:700;transition:background .2s}
.hdr-btn:hover{background:rgba(255,255,255,.22)}
.hdr-btn.red{background:var(--red)}
.hdr-btn.red:hover{background:#d63336}

/* Layout */
.page{margin-top:46px;min-height:calc(100vh - 46px)}
.wrap{max-width:700px;margin:0 auto;padding:16px 14px 60px}

/* Login */
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 46px);text-align:center}
.login-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:40px 32px;width:100%;max-width:400px}
.login-card h2{font-size:22px;margin-bottom:4px}
.login-card h2 span{color:var(--red)}
.login-card p{font-size:13px;color:var(--mid);margin-bottom:24px}
.login-btn{background:var(--dark);color:var(--white);padding:12px 24px;border-radius:6px;font-size:14px;font-weight:700;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s}
.login-btn:hover{background:var(--mid)}
.tagline{font-size:11px;color:var(--mid);margin-top:16px;font-style:italic}

/* Dashboard cards */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;margin-bottom:10px}
.card.click{cursor:pointer;transition:box-shadow .2s}
.card.click:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.badge{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.badge.rec{background:var(--lb);color:var(--blue)}
.badge.one{background:var(--bg);color:var(--mid)}
.day-label{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sync-note{font-size:11px;font-weight:400;color:var(--mid)}
.grp-label{margin-top:16px;margin-bottom:8px;font-size:12px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.grp-label .cnt{font-weight:400;opacity:.6}
.cf-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--bg)}
.cf-label{font-size:11px;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.cf-item{display:flex;align-items:center;gap:7px;font-size:12px;margin-bottom:3px}
.cf-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0}
.start-btn{background:var(--red);color:var(--white);text-align:center;padding:9px;border-radius:6px;font-size:13px;font-weight:700;margin-top:10px;width:100%;transition:background .2s}
.start-btn:hover{background:#d63336}
.adhoc-btn{border:1px dashed var(--bdr);border-radius:var(--r);padding:12px;text-align:center;font-size:13px;color:var(--mid);margin-top:6px;background:none;width:100%;transition:all .2s}
.adhoc-btn:hover{border-color:var(--red);color:var(--red)}

/* ══ RUNNER SIDEBAR LAYOUT ══ */
.runner{display:flex;height:calc(100vh - 46px)}
.sidebar{width:220px;background:#f7f7f7;border-right:1px solid var(--bdr);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.sb-meeting{padding:12px 14px;border-bottom:1px solid var(--bdr);font-size:13px;font-weight:700}
.sb-meeting small{font-weight:400;color:var(--mid);display:block;margin-top:2px;font-size:11px}

.sb-item{padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mid);cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.sb-item:hover{background:#f0f0f0}
.sb-item.active{background:var(--white);border-left-color:var(--red);color:var(--dark);font-weight:700}
.sb-item.done{opacity:.6}
.sb-item.done .sn{background:var(--green)}
.sn{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:var(--white);background:var(--bdr)}
.sn.act{background:var(--red)}
.sb-item .sb-time{margin-left:auto;font-size:10px;font-variant-numeric:tabular-nums;flex-shrink:0}
.sb-item .sb-time.over{color:var(--red);font-weight:700}

.sb-section{border-top:1px solid var(--bdr);padding:12px 14px;margin-top:auto}
.sb-section-label{font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sb-attendee{font-size:11px;color:var(--mid);line-height:1.8}
.sb-edit-btn{background:none;color:var(--blue);font-size:11px;padding:4px 0;text-decoration:underline;margin-top:8px;display:block}

/* Main content */
.main{flex:1;overflow-y:auto;padding:20px 24px 40px;background:var(--white)}
.main-title{font-size:16px;font-weight:700;margin-bottom:4px}
.main-sub{font-size:12px;color:var(--mid);margin-bottom:16px}

.t-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.t-disp{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;min-width:70px;text-align:center}
.t-disp.over{color:var(--red)}
.t-btn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--dark);color:var(--white);transition:background .2s}
.t-btn:hover{background:var(--mid)}
.t-lbl{color:var(--mid);font-size:11px}
.t-bar{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.t-fill{height:100%;background:var(--green);border-radius:2px;transition:width 1s linear,background .3s}
.t-fill.warn{background:var(--amber)}
.t-fill.over{background:var(--red)}

textarea.notes{width:100%;min-height:80px;border:1px solid var(--bdr);border-radius:6px;padding:10px 12px;font-size:13px;resize:vertical;line-height:1.5}
textarea.notes:focus{outline:2px solid var(--red);border-color:transparent}
.sub-l{font-size:11px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 6px}

/* Headlines */
.hl-item{background:var(--bg);border-radius:6px;padding:10px 12px;margin-bottom:8px;position:relative}
.hl-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.hl-text{font-size:13px;font-weight:700;flex:1}
.hl-meta{font-size:10px;color:var(--mid);margin-top:2px}
.hl-status{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;text-transform:uppercase;cursor:pointer}
.hl-status.open{background:var(--lb);color:var(--blue)}
.hl-status.discussed{background:var(--lg);color:var(--green)}
.hl-notes{margin-top:6px}
.hl-notes textarea{width:100%;min-height:40px;border:1px solid var(--bdr);border-radius:4px;padding:6px 8px;font-size:12px;resize:vertical;line-height:1.4}
.hl-notes textarea:focus{outline:2px solid var(--red);border-color:transparent}
.hl-action-btn{font-size:11px;color:var(--red);background:none;padding:4px 0;margin-top:4px;font-weight:700}

/* Actions */
.a-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--bg)}
.a-item:last-child{border-bottom:none}
.a-chk{width:18px;height:18px;border:2px solid var(--bdr);border-radius:4px;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:10px}
.a-chk.done{background:var(--green);border-color:var(--green);color:white}
.a-chk.cf{border-color:var(--amber)}
.a-txt{font-size:13px;line-height:1.4;flex:1}
.a-txt.dn{text-decoration:line-through;opacity:.5}
.a-meta{font-size:11px;color:var(--mid);margin-top:1px}
.a-meta span{margin-right:10px}
.cf-badge{font-size:9px;background:var(--la);color:var(--amber);padding:1px 6px;border-radius:8px;font-weight:700;margin-left:4px}
.a-rm{background:none;color:var(--bdr);font-size:15px;padding:2px 4px;line-height:1}
.a-rm:hover{color:var(--red)}

.add-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.add-row input,.add-row select{padding:7px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:12px;background:var(--white)}
.add-row input{flex:1;min-width:100px}
.add-row input:focus,.add-row select:focus{outline:2px solid var(--red);border-color:transparent}
.add-btn{background:var(--red);color:var(--white);padding:7px 14px;border-radius:6px;font-size:12px;font-weight:700;transition:background .2s;white-space:nowrap}
.add-btn:hover{background:#d63336}
.add-btn.sec{background:var(--dark)}

/* Issues */
.issue-item{padding:10px 0;border-bottom:1px solid var(--bg)}
.issue-item:last-child{border-bottom:none}
.issue-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.issue-title{font-size:13px;font-weight:700;flex:1}
.ib{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;cursor:pointer}
.ib.open{background:var(--lr);color:var(--red)}
.ib.discussing{background:var(--la);color:var(--amber)}
.ib.solved{background:var(--lg);color:var(--green)}

/* Summary */
.sum-sec{margin-bottom:16px}
.sum-sec h3{font-size:12px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sum-notes{font-size:13px;line-height:1.6;color:var(--mid);white-space:pre-wrap}
.sum-act{padding:4px 0;font-size:12px;display:flex;gap:8px}
.sum-dot{width:6px;height:6px;border-radius:50%;background:var(--red);margin-top:5px;flex-shrink:0}

/* Nav footer in main */
.main-nav{display:flex;gap:8px;margin-top:24px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--bg)}

/* Loading/empty */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--mid);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--mid);font-size:14px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--dark);color:var(--white);padding:10px 18px;border-radius:6px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

/* Agenda editor modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:250;display:flex;align-items:center;justify-content:center}
.modal{background:var(--white);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.2);padding:24px;width:90%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:16px;margin-bottom:16px}
.modal-sec{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bg)}
.modal-sec input{flex:1;padding:6px 8px;border:1px solid var(--bdr);border-radius:4px;font-size:12px}
.modal-sec input:focus{outline:2px solid var(--red);border-color:transparent}
.modal-sec .dur-input{width:60px}
.modal-sec .rm-sec{color:var(--bdr);background:none;font-size:16px;padding:2px 4px}
.modal-sec .rm-sec:hover{color:var(--red)}

@media print{.hdr,.sidebar{display:none}.runner{display:block}.main{padding:0}}
@media(max-width:700px){.sidebar{width:180px}.main{padding:14px 16px 40px}}
@media(max-width:500px){.sidebar{display:none}.runner{display:block}}
</style>
</head>
<body>

<div class="hdr">
  <h1>MEETING <span>RUNNER</span></h1>
  <div class="hdr-r">
    <span id="clockEl" style="color:rgba(255,255,255,.5);font-variant-numeric:tabular-nums"></span>
    <span id="userEl" style="color:rgba(255,255,255,.5)"></span>
    <button class="hdr-btn" id="hdrBtn" style="display:none"></button>
  </div>
</div>
<div class="page" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════
   CONFIG
   ═══════════════════════════════ */
const CONFIG = {
  clientId: 'c6595fee-5861-474a-b604-4487ac361580',
  authority: 'https://login.microsoftonline.com/8c8bc073-973e-4ddf-9384-38498e8aa324',
  redirectUri: window.location.origin + window.location.pathname,
  scopes: ['User.Read','Calendars.ReadWrite','Mail.Send','Sites.ReadWrite.All'],
  spSite: 'unicrest.sharepoint.com:/sites/UnicrestGroup'
};
const GRAPH = 'https://graph.microsoft.com/v1.0';
const DEFAULT_AGENDA = [
  {name:'Check-in',duration:5,type:'notes'},
  {name:'Updates',duration:10,type:'headlines'},
  {name:'Issues & Actions',duration:35,type:'issues'},
  {name:'Wrap-up',duration:5,type:'wrapup'}
];

let msalApp, accessToken, currentUser, siteId;

/* ═══════════════════════════════
   STATE
   ═══════════════════════════════ */
let S = {
  screen:'login',
  meetings:[], loadingCal:false,
  // prep (pre-meeting view)
  prepMeeting:null, prepSeriesId:null, prepAgenda:[],
  // runner
  activeMeeting:null, seriesId:null, curSec:0,
  sections:[], // agenda for this meeting
  headlines:[], actions:[], issues:[],
  timerOn:false, elapsed:0, startTime:null,
  // modal
  showAgendaEditor:false, editAgenda:[]
};
let tInt = null;

/* ═══════════════════════════════
   AUTH
   ═══════════════════════════════ */
async function initAuth(){
  try {
    msalApp = new msal.PublicClientApplication({
      auth:{clientId:CONFIG.clientId,authority:CONFIG.authority,redirectUri:CONFIG.redirectUri},
      cache:{cacheLocation:'localStorage',storeAuthStateInCookie:false}
    });
    await msalApp.initialize();
    const resp = await msalApp.handleRedirectPromise();
    if(resp){accessToken=resp.accessToken;currentUser=resp.account;}
    else{
      const a=msalApp.getAllAccounts();
      if(a.length){currentUser=a[0];try{const t=await msalApp.acquireTokenSilent({scopes:CONFIG.scopes,account:currentUser});accessToken=t.accessToken;}catch{currentUser=null;}}
    }
    if(currentUser&&accessToken){
      S.screen='dash';
      document.getElementById('userEl').textContent=currentUser.name||currentUser.username;
      await initSharePoint();
      loadCal();
    }
  } catch(err){console.error('Auth error',err);}
  render();
}

async function login(){try{await msalApp.loginRedirect({scopes:CONFIG.scopes});}catch(e){alert('Login failed: '+e.message);}}
function logout(){msalApp.logoutRedirect();}

async function getToken(){
  try{const r=await msalApp.acquireTokenSilent({scopes:CONFIG.scopes,account:currentUser});accessToken=r.accessToken;return accessToken;}
  catch{await msalApp.acquireTokenRedirect({scopes:CONFIG.scopes});return null;}
}

async function gGet(url){const t=await getToken();if(!t)return null;const r=await fetch(GRAPH+url,{headers:{Authorization:'Bearer '+t}});if(!r.ok){console.error('Graph GET',r.status,url);return null;}return r.json();}
async function gPost(url,body){const t=await getToken();if(!t)return null;const r=await fetch(GRAPH+url,{method:'POST',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok){const err=await r.text();console.error('Graph POST',r.status,url,err);return null;}return r.json();}
async function gPatch(url,body){const t=await getToken();if(!t)return null;const r=await fetch(GRAPH+url,{method:'PATCH',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok){console.error('Graph PATCH',r.status,url);return null;}return r.json();}
async function gDel(url){const t=await getToken();if(!t)return;await fetch(GRAPH+url,{method:'DELETE',headers:{Authorization:'Bearer '+t}});}

/* ═══════════════════════════════
   SHAREPOINT SETUP
   ═══════════════════════════════ */
const LISTS = {
  config: {name:'MR_Config', id:null},
  headlines: {name:'MR_Headlines', id:null},
  actions: {name:'MR_Actions', id:null}
};

async function initSharePoint(){
  // Get site ID
  const site = await gGet('/sites/'+CONFIG.spSite);
  if(!site){console.error('Could not find SharePoint site');return;}
  siteId = site.id;

  // Ensure lists exist
  const existing = await gGet(`/sites/${siteId}/lists?$select=id,displayName`);
  const ex = existing && existing.value ? existing.value : [];

  for(const key of Object.keys(LISTS)){
    const found = ex.find(l => l.displayName === LISTS[key].name);
    if(found){LISTS[key].id = found.id;}
    else{
      const created = await createList(LISTS[key].name, key);
      if(created) LISTS[key].id = created.id;
    }
  }
}

async function createList(name, key){
  const cols = {
    config: [
      {name:'SeriesId',text:{}},
      {name:'AgendaJSON',text:{allowMultipleLines:true}}
    ],
    headlines: [
      {name:'SeriesId',text:{}},
      {name:'MeetingDate',text:{}},
      {name:'CreatedByName',text:{}},
      {name:'Status',text:{}},
      {name:'Notes',text:{allowMultipleLines:true}}
    ],
    actions: [
      {name:'SeriesId',text:{}},
      {name:'Owner',text:{}},
      {name:'DueDate',text:{}},
      {name:'Status',text:{}},
      {name:'Section',text:{}},
      {name:'MeetingDate',text:{}},
      {name:'CreatedByName',text:{}}
    ]
  };
  const body = {
    displayName: name,
    columns: cols[key],
    list: {template:'genericList'}
  };
  return await gPost(`/sites/${siteId}/lists`, body);
}

/* ═══════════════════════════════
   SHAREPOINT CRUD
   ═══════════════════════════════ */
function spUrl(listKey){return `/sites/${siteId}/lists/${LISTS[listKey].id}`;}

async function spGetItems(listKey, filter){
  let url = spUrl(listKey)+'/items?$expand=fields&$top=200';
  if(filter) url += '&$filter='+encodeURIComponent(filter);
  const d = await gGet(url);
  return d && d.value ? d.value : [];
}

async function spAddItem(listKey, fields){
  return await gPost(spUrl(listKey)+'/items', {fields});
}

async function spUpdateItem(listKey, itemId, fields){
  return await gPatch(spUrl(listKey)+`/items/${itemId}/fields`, fields);
}

async function spDeleteItem(listKey, itemId){
  await gDel(spUrl(listKey)+`/items/${itemId}`);
}

/* ═══════════════════════════════
   AGENDA CONFIG
   ═══════════════════════════════ */
async function getAgenda(seriesId){
  if(!seriesId || !LISTS.config.id) return [...DEFAULT_AGENDA];
  const items = await spGetItems('config', `fields/SeriesId eq '${seriesId}'`);
  if(items.length && items[0].fields.AgendaJSON){
    try{return JSON.parse(items[0].fields.AgendaJSON);}catch{return [...DEFAULT_AGENDA];}
  }
  return [...DEFAULT_AGENDA];
}

async function saveAgenda(seriesId, agenda){
  if(!seriesId || !LISTS.config.id) return;
  const items = await spGetItems('config', `fields/SeriesId eq '${seriesId}'`);
  const json = JSON.stringify(agenda);
  if(items.length){
    await spUpdateItem('config', items[0].id, {AgendaJSON:json});
  } else {
    await spAddItem('config', {Title:seriesId, SeriesId:seriesId, AgendaJSON:json});
  }
  toast('Agenda saved');
}

/* ═══════════════════════════════
   HEADLINES
   ═══════════════════════════════ */
async function loadHeadlines(seriesId){
  if(!seriesId || !LISTS.headlines.id){S.headlines=[];return;}
  const items = await spGetItems('headlines', `fields/SeriesId eq '${seriesId}'`);
  S.headlines = items.map(it=>({
    id:it.id, text:it.fields.Title||'', seriesId:it.fields.SeriesId,
    date:it.fields.MeetingDate||'', by:it.fields.CreatedByName||'',
    status:it.fields.Status||'open', notes:it.fields.Notes||''
  }));
}

async function addHeadline(text){
  if(!text || !text.trim()) return;
  text = text.trim();
  const sid = S.seriesId || S.prepSeriesId;
  if(!sid){toast('Cannot add headlines to ad-hoc meetings');return;}
  if(!LISTS.headlines.id){toast('SharePoint list not ready');return;}
  const today = new Date().toISOString().slice(0,10);
  const userName = currentUser.name || currentUser.username;
  try {
    const item = await spAddItem('headlines', {
      Title:text, SeriesId:sid, MeetingDate:today,
      CreatedByName:userName, Status:'open', Notes:''
    });
    if(item){S.headlines.push({id:item.id, text, seriesId:sid, date:today, by:userName, status:'open', notes:''});toast('Headline saved');}
    else toast('Failed to save headline');
  } catch(err){console.error('addHeadline error',err);toast('Error saving headline');}
  render();
}

async function updateHeadline(id, fields){
  const hl = S.headlines.find(h=>h.id===id);
  if(!hl) return;
  const spFields = {};
  if(fields.status !== undefined){hl.status=fields.status; spFields.Status=fields.status;}
  if(fields.notes !== undefined){hl.notes=fields.notes; spFields.Notes=fields.notes;}
  await spUpdateItem('headlines', id, spFields);
}

async function deleteHeadline(id){
  await spDeleteItem('headlines', id);
  S.headlines = S.headlines.filter(h=>h.id!==id);
  render();
}

/* ═══════════════════════════════
   ACTIONS (SharePoint)
   ═══════════════════════════════ */
async function loadActions(seriesId){
  if(!seriesId || !LISTS.actions.id){S.actions=[];return;}
  const items = await spGetItems('actions', `fields/SeriesId eq '${seriesId}'`);
  S.actions = items.map(it=>({
    id:it.id, text:it.fields.Title||'', owner:it.fields.Owner||'',
    due:it.fields.DueDate||'', status:it.fields.Status||'open',
    section:it.fields.Section||'', date:it.fields.MeetingDate||'',
    by:it.fields.CreatedByName||'', done:it.fields.Status==='done'
  }));
}

async function addAction(text, owner, due, section){
  if(!LISTS.actions.id) return;
  const today = new Date().toISOString().slice(0,10);
  const userName = currentUser.name || currentUser.username;
  const sid = S.seriesId || S.prepSeriesId || 'adhoc_'+Date.now();
  const item = await spAddItem('actions', {
    Title:text, SeriesId:sid, Owner:owner, DueDate:due,
    Status:'open', Section:section, MeetingDate:today, CreatedByName:userName
  });
  if(item){S.actions.push({id:item.id, text, owner, due, status:'open', section, date:today, by:userName, done:false});toast('Action saved');}
  else toast('Failed to save action');
  render();
}

async function toggleAction(id){
  const a = S.actions.find(x=>x.id===id);
  if(!a) return;
  a.done=!a.done; a.status=a.done?'done':'open';
  await spUpdateItem('actions', id, {Status:a.status});
  render();
}

async function deleteAction(id){
  await spDeleteItem('actions', id);
  S.actions = S.actions.filter(x=>x.id!==id);
  render();
}

/* ═══════════════════════════════
   CALENDAR
   ═══════════════════════════════ */
function classifyFreq(rec){
  if(!rec||!rec.pattern) return 'today';
  const t=rec.pattern.type, iv=rec.pattern.interval||1;
  if(t==='daily') return 'daily';
  if(t==='weekly') return iv<=2?'weekly':'monthly';
  if(t==='absoluteMonthly'||t==='relativeMonthly') return 'monthly';
  return 'weekly';
}

async function loadCal(){
  S.loadingCal=true; render();
  const now=new Date();
  const sod=new Date(now);sod.setHours(0,0,0,0);
  const eod=new Date(now);eod.setHours(23,59,59,999);
  const p=new URLSearchParams({
    startDateTime:sod.toISOString(),endDateTime:eod.toISOString(),
    $orderby:'start/dateTime',$top:'50',
    $select:'id,subject,start,end,attendees,onlineMeetingUrl,seriesMasterId,type'
  });
  const d=await gGet('/me/calendarView?'+p);
  if(!d||!d.value){S.loadingCal=false;render();return;}

  const sids=new Set();
  d.value.forEach(ev=>{if(ev.seriesMasterId)sids.add(ev.seriesMasterId);});
  const pats={};
  await Promise.all([...sids].map(async sid=>{
    try{const m=await gGet('/me/events/'+sid+'?$select=recurrence');if(m&&m.recurrence)pats[sid]=m.recurrence;}catch{}
  }));

  S.meetings=d.value.map(ev=>{
    const rec=ev.type==='occurrence'||ev.type==='exception'||!!ev.seriesMasterId;
    const sid=ev.seriesMasterId||(rec?ev.id:null);
    const st=new Date(ev.start.dateTime+'Z');
    const en=new Date(ev.end.dateTime+'Z');
    const att=(ev.attendees||[]).map(a=>({name:a.emailAddress.name,email:a.emailAddress.address}));
    return {
      id:ev.id,subject:ev.subject||'Untitled',start:st,end:en,
      durMin:Math.round((en-st)/60000),attendees:att,
      isRec:rec,seriesId:sid,freq:rec?classifyFreq(pats[sid]):'today',
      onlineUrl:ev.onlineMeetingUrl||null
    };
  });
  S.loadingCal=false;render();
}

function addIssue(){
  const t=document.getElementById('iT');if(!t||!t.value.trim())return;
  S.issues.push({id:Date.now(),title:t.value.trim(),status:'open',notes:''});
  t.value='';render();t.focus();
}
function cycleI(id){const i=S.issues.find(x=>x.id===id);if(!i)return;const o=['open','discussing','solved'];i.status=o[(o.indexOf(i.status)+1)%o.length];render();}
function iNotes(id,v){const i=S.issues.find(x=>x.id===id);if(i)i.notes=v;}
function rmIssue(id){S.issues=S.issues.filter(x=>x.id!==id);render();}

/* ═══════════════════════════════
   TIMER
   ═══════════════════════════════ */
function timerStart(){if(tInt)return;S.timerOn=true;tInt=setInterval(()=>{S.sections[S.curSec].elapsed++;S.elapsed++;timerUI();},1000);render();}
function timerStop(){S.timerOn=false;clearInterval(tInt);tInt=null;render();}
function timerUI(){
  const sec=S.sections[S.curSec];
  const el=document.getElementById('tD'),fl=document.getElementById('tF'),ck=document.getElementById('clockEl');
  if(!el)return;
  const rem=sec.duration*60-sec.elapsed,ov=rem<0,ab=Math.abs(rem);
  el.textContent=(ov?'-':'')+Math.floor(ab/60)+':'+String(ab%60).padStart(2,'0');
  el.className='t-disp'+(ov?' over':'');
  if(fl){const p=Math.min((sec.elapsed/(sec.duration*60))*100,100);fl.style.width=p+'%';fl.className='t-fill'+(ov?' over':p>80?' warn':'');}
  if(ck){const m=Math.floor(S.elapsed/60),s=S.elapsed%60;ck.textContent=m+':'+String(s).padStart(2,'0')+' elapsed';}
  // Update sidebar timer
  const st=document.getElementById('sbTime'+S.curSec);
  if(st){st.textContent=(ov?'-':'')+Math.floor(ab/60)+':'+String(ab%60).padStart(2,'0');st.className='sb-time'+(ov?' over':'');}
}

   ═══════════════════════════════ */
function goSec(i){if(i<0||i>=curSections().length)return;if(S.screen==='runner')timerStop();S.curSec=i;render();if(S.screen==='runner')timerUI();}
function nextSec(){S.sections[S.curSec].done=true;timerStop();if(S.curSec<S.sections.length-1){S.curSec++;render();}else endMeeting();}
function prevSec(){if(S.curSec>0){timerStop();S.curSec--;render();}}

async function prepMtg(idx){
  const m=S.meetings[idx];
  S.prepMeeting=m; S.prepSeriesId=m.seriesId;
  S.curSec=0;
  const agenda = await getAgenda(m.seriesId);
  S.prepAgenda = agenda.map(a=>({...a, notes:'', elapsed:0, done:false}));
  await loadHeadlines(m.seriesId);
  await loadActions(m.seriesId);
  S.screen='prep'; render();
}

function startFromPrep(){
  // Carry prep data directly into runner, no reload needed
  S.activeMeeting=S.prepMeeting;
  S.seriesId=S.prepSeriesId;
  S.curSec=0;
  S.sections=S.prepAgenda.map(a=>({...a})); // keep notes from prep
  S.issues=[];
  S.elapsed=0;
  S.startTime=new Date();
  S.timerOn=false;
  // headlines and actions are already in S.headlines and S.actions from prep
  S.screen='runner';render();
}

async function startMtg(idx){
  const m=idx!==undefined?S.meetings[idx]:null;
  S.activeMeeting=m;S.seriesId=m?m.seriesId:null;
  S.curSec=0;S.issues=[];S.elapsed=0;S.startTime=new Date();S.timerOn=false;

  // Load agenda from SharePoint (or default)
  const agenda = await getAgenda(S.seriesId);
  S.sections=agenda.map(a=>({...a,notes:'',elapsed:0,done:false}));

  // Load headlines and actions from SharePoint
  await loadHeadlines(S.seriesId);
  await loadActions(S.seriesId);

  S.screen='runner';render();
}
function startAdhoc(){S.activeMeeting=null;S.seriesId=null;startMtg();}

function endMeeting(){
  timerStop();S.sections[S.curSec].done=true;
  S.screen='summary';render();
}
function backToDash(){timerStop();S.screen='dash';S.prepMeeting=null;S.prepSeriesId=null;S.prepAgenda=[];document.getElementById('clockEl').textContent='';loadCal();}
function hdrAction(){if(S.screen==='runner'){if(confirm('End this meeting?'))endMeeting();}else if(S.screen==='summary')backToDash();}
function updNotes(v){curSections()[S.curSec].notes=v;}

function edSetName(i,v){S.editAgenda[i].name=v;}
function edSetDur(i,v){S.editAgenda[i].duration=parseInt(v)||1;}
function edSetType(i,v){S.editAgenda[i].type=v;}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

/* ═══════════════════════════════
   RENDER
   ═══════════════════════════════ */
function render(){
  const app=document.getElementById('app'),btn=document.getElementById('hdrBtn');
  if(S.screen==='login'){btn.style.display='none';app.innerHTML='<div class="wrap">'+rLogin()+'</div>';}
  else if(S.screen==='dash'){btn.style.display='';btn.textContent='Sign out';btn.className='hdr-btn';btn.onclick=logout;app.innerHTML='<div class="wrap">'+rDash()+'</div>';}
  else if(S.screen==='runner'){
    btn.style.display='';btn.textContent='End meeting';btn.className='hdr-btn red';btn.onclick=hdrAction;
    app.innerHTML=rRunner()+(S.showAgendaEditor?rAgendaEditor():'');
    const na=document.getElementById('sN');if(na)na.value=curSections()[S.curSec].notes||'';
    timerUI();
  }
  else if(S.screen==='prep'){
    btn.style.display='';btn.textContent='\u2190 Dashboard';btn.className='hdr-btn';btn.onclick=backToDash;
    document.getElementById('clockEl').textContent='';
    app.innerHTML=rPrep()+(S.showAgendaEditor?rAgendaEditor():'');
    const na=document.getElementById('sN');if(na)na.value=curSections()[S.curSec].notes||'';
  }
  else if(S.screen==='summary'){btn.style.display='';btn.textContent='\u2190 Dashboard';btn.className='hdr-btn';btn.onclick=backToDash;document.getElementById('clockEl').textContent='';app.innerHTML='<div class="wrap">'+rSummary()+'</div>';}
}

function rLogin(){
  return `<div class="login"><div class="login-card">
    <h2>MEETING <span>RUNNER</span></h2>
    <p>Run structured meetings with your team. Sign in with Microsoft to sync your calendar.</p>
    <button class="login-btn" onclick="login()">
      <svg viewBox="0 0 21 21" width="20" height="20" fill="none"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
      Sign in with Microsoft
    </button>
    <div class="tagline">Proven Excellence</div>
  </div></div>`;
}

function rDash(){
  if(S.loadingCal)return `<div class="loading"><div class="spinner"></div>Loading your calendar...</div>`;
  const now=new Date();
  const ds=now.toLocaleDateString('en-NZ',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  if(!S.meetings.length) return `<div class="day-label">${ds}</div><div class="empty">No meetings on your calendar today.</div><button class="adhoc-btn" onclick="startAdhoc()">+ Start an ad-hoc meeting</button>`;

  const groups=[
    {key:'today',label:'Today',meetings:[]},
    {key:'daily',label:'Daily',meetings:[]},
    {key:'weekly',label:'Weekly',meetings:[]},
    {key:'monthly',label:'Monthly',meetings:[]}
  ];
  S.meetings.forEach((m,i)=>{const g=groups.find(g=>g.key===m.freq)||groups[0];g.meetings.push({...m,idx:i});});

  let html=`<div class="day-label">${ds}<span class="sync-note">Synced from Outlook</span></div>`;
  groups.forEach(g=>{
    if(!g.meetings.length)return;
    html+=`<div class="grp-label">${g.label}<span class="cnt">(${g.meetings.length})</span></div>`;
    g.meetings.forEach(m=>{
      const time=m.start.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit',hour12:true});
      const n=m.attendees.length;
      html+=`<div class="card click">
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div><div style="font-size:14px;font-weight:700">${e(m.subject)}</div>
          <div style="font-size:12px;color:var(--mid);margin-top:2px">${time} \u00B7 ${m.durMin} min \u00B7 ${n} attendee${n!==1?'s':''}</div></div>
          <span class="badge ${m.isRec?'rec':'one'}">${m.isRec?'Recurring':'One-off'}</span>
        </div>
        <button class="start-btn" onclick="startMtg(${m.idx})">Start meeting</button>
        ${m.isRec?'<button class="start-btn" onclick="prepMtg('+m.idx+')" style="background:var(--dark);margin-top:6px">Prepare / View agenda</button>':''}
      </div>`;
    });
  });
  html+=`<button class="adhoc-btn" onclick="startAdhoc()">+ Start an ad-hoc meeting</button>`;
  return html;
}

/* ══ HELPERS for shared runner/prep logic ══ */
function curSections(){return S.screen==='prep'?S.prepAgenda:S.sections;}
function curSecName(){return curSections()[S.curSec].name;}
function curAttendees(){
  if(S.screen==='prep') return S.prepMeeting?S.prepMeeting.attendees:[];
  return S.activeMeeting?S.activeMeeting.attendees:[];
}

/* ══ PREPARE (Full pre-meeting editor) ══ */
function rPrep(){
  const m=S.prepMeeting;
  if(!m) return '<div class="empty">No meeting selected.</div>';
  const secs=S.prepAgenda;
  const att=m.attendees||[];
  const sec=secs[S.curSec];
  if(!sec) return '<div class="empty">No agenda loaded.</div>';

  // Sidebar
  let sb=`<div class="sidebar">
    <div class="sb-meeting">${e(m.subject)}<small>Prepare mode</small></div>`;

  secs.forEach((s,i)=>{
    const isAct=i===S.curSec;
    sb+=`<div class="sb-item ${isAct?'active':''}" onclick="goSec(${i})">
      <div class="sn ${isAct?'act':''}">${i+1}</div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(s.name)}</span>
      <span class="sb-time">${s.duration}m</span>
    </div>`;
  });

  sb+=`<div class="sb-section">
    <div class="sb-section-label">Attendees</div>
    <div class="sb-attendee">${att.length?att.map(a=>e(a.name)).join('<br>'):'None'}</div>
    <button class="sb-edit-btn" onclick="openAgendaEditor()">Edit agenda sections</button>
  </div></div>`;

  // Main content
  let main=`<div class="main">`;
  main+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div class="main-title">${e(sec.name)}</div>
    <div style="font-size:11px;color:var(--mid)">${sec.duration} min</div>
  </div>`;

  // Section content (reuse same functions as runner)
  if(sec.type==='headlines') main+=rHeadlinesSection(att);
  else if(sec.type==='issues') main+=rIssuesSection(att);
  else if(sec.type==='wrapup') main+=rWrapupSection();
  else main+=rNotesSection(att);

  // Nav
  const last=S.curSec===secs.length-1;
  main+=`<div class="main-nav">
    ${S.curSec>0?'<button class="hdr-btn" onclick="goSec('+(S.curSec-1)+')">\u2190 '+secs[S.curSec-1].name+'</button>':''}
    ${!last?'<button class="hdr-btn" style="background:var(--mid);color:var(--white)" onclick="goSec('+(S.curSec+1)+')">'+secs[S.curSec+1].name+' \u2192</button>':''}
    <button class="hdr-btn red" onclick="startFromPrep()">Start meeting</button>
  </div>`;

  main+=`</div>`;
  return `<div class="runner">${sb}${main}</div>`;
}

/* ══ RUNNER (Sidebar Layout) ══ */
function rRunner(){
  const sec=S.sections[S.curSec];
  const mt=S.activeMeeting?S.activeMeeting.subject:'Ad-hoc meeting';
  const att=S.activeMeeting?S.activeMeeting.attendees:[];

  // Sidebar
  let sb=`<div class="sidebar">
    <div class="sb-meeting">${e(mt)}<small>${S.activeMeeting&&S.activeMeeting.isRec?'Recurring':'One-off'}</small></div>`;

  S.sections.forEach((s,i)=>{
    const isAct=i===S.curSec;
    const isDone=s.done;
    const rem=s.duration*60-s.elapsed;
    const ov=rem<0;
    const ab=Math.abs(rem);
    const timeStr=isDone?'Done':(ov?'-':'')+Math.floor(ab/60)+':'+String(ab%60).padStart(2,'0');
    sb+=`<div class="sb-item ${isAct?'active':''} ${isDone?'done':''}" onclick="goSec(${i})">
      <div class="sn ${isAct?'act':isDone?'done':''}">${i+1}</div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(s.name)}</span>
      <span class="sb-time ${ov&&!isDone?'over':''}" id="sbTime${i}">${isDone?'Done':s.duration+'m'}</span>
    </div>`;
  });

  sb+=`<div class="sb-section">
    <div class="sb-section-label">Attendees</div>
    <div class="sb-attendee">${att.length?att.map(a=>e(a.name)).join('<br>'):'None'}</div>
    ${S.seriesId?'<button class="sb-edit-btn" onclick="openAgendaEditor()">Edit agenda</button>':''}
  </div></div>`;

  // Main content
  let main=`<div class="main">`;
  main+=`<div class="t-row">
    <div class="t-lbl">${sec.duration} min</div>
    <div class="t-disp" id="tD">--:--</div>
    <button class="t-btn" onclick="${S.timerOn?'timerStop()':'timerStart()'}">${S.timerOn?'\u23F8':'\u25B6'}</button>
    <div class="t-bar"><div class="t-fill" id="tF" style="width:0"></div></div>
  </div>`;
  main+=`<div class="main-title">${e(sec.name)}</div>`;

  // Section content based on type
  if(sec.type==='headlines') main+=rHeadlinesSection(att);
  else if(sec.type==='issues') main+=rIssuesSection(att);
  else if(sec.type==='wrapup') main+=rWrapupSection();
  else main+=rNotesSection(att);

  // Nav
  const last=S.curSec===S.sections.length-1;
  main+=`<div class="main-nav">
    ${S.curSec>0?'<button class="hdr-btn" onclick="prevSec()">\u2190 Back</button>':''}
    <button class="hdr-btn red" onclick="nextSec()">${last?'Finish':'Next: '+S.sections[Math.min(S.curSec+1,S.sections.length-1)].name+' \u2192'}</button>
  </div>`;

  main+=`</div>`;
  return `<div class="runner">${sb}${main}</div>`;
}

function rNotesSection(att){
  const oo=att.map(a=>`<option value="${e(a.name)}">${e(a.name)}</option>`).join('');
  const secActions=S.actions.filter(a=>a.section===curSecName());
  return `
    <div class="sub-l" style="margin-top:8px">Notes</div>
    <textarea class="notes" id="sN" placeholder="Notes..." oninput="updNotes(this.value)"></textarea>
    <div class="sub-l">Actions</div>
    ${rActionsList(secActions)}
    ${rAddAction(oo, curSecName())}`;
}

function rHeadlinesSection(att){
  const oo=att.map(a=>`<option value="${e(a.name)}">${e(a.name)}</option>`).join('');
  const open=S.headlines.filter(h=>h.status==='open');
  const discussed=S.headlines.filter(h=>h.status==='discussed');
  const secActions=S.actions.filter(a=>a.section===curSecName());

  let html=`<div class="main-sub">Discussion points. Anyone can add a headline before or during the meeting.</div>`;

  // Add headline
  html+=`<div class="add-row" style="margin-bottom:16px">
    <input type="text" id="hlT" placeholder="Add a headline..." onkeydown="if(event.key==='Enter'){addHeadline(this.value);this.value='';}">
    <button class="add-btn" onclick="const i=document.getElementById('hlT');addHeadline(i.value);i.value='';">+ Headline</button>
  </div>`;

  if(open.length){
    html+=`<div class="sub-l">Open (${open.length})</div>`;
    open.forEach(h=>{html+=rHeadlineItem(h,oo);});
  }
  if(discussed.length){
    html+=`<div class="sub-l">Discussed (${discussed.length})</div>`;
    discussed.forEach(h=>{html+=rHeadlineItem(h,oo);});
  }
  if(!S.headlines.length) html+=`<div style="font-size:13px;color:var(--mid);padding:8px 0">No headlines yet. Add one above.</div>`;

  html+=`<div class="sub-l" style="margin-top:20px">Actions from this section</div>`;
  html+=rActionsList(secActions);
  html+=rAddAction(oo, curSecName());

  return html;
}

function rHeadlineItem(h,oo){
  return `<div class="hl-item">
    <div class="hl-top">
      <div style="flex:1">
        <div class="hl-text">${e(h.text)}</div>
        <div class="hl-meta">Added by ${e(h.by)}</div>
      </div>
      <span class="hl-status ${h.status}" onclick="updateHeadline('${h.id}',{status:'${h.status==='open'?'discussed':'open'}'});render();">${h.status}</span>
      <button class="a-rm" onclick="deleteHeadline('${h.id}')">&times;</button>
    </div>
    <div class="hl-notes">
      <textarea placeholder="Discussion notes..." oninput="updateHeadline('${h.id}',{notes:this.value})">${e(h.notes)}</textarea>
    </div>
    <button class="hl-action-btn" onclick="promptActionFromHL('${h.id}')">+ Create action from this</button>
  </div>`;
}

function rIssuesSection(att){
  const oo=att.map(a=>`<option value="${e(a.name)}">${e(a.name)}</option>`).join('');
  let html=`<div class="main-sub">Identify, Discuss, Solve. Tap the status badge to cycle.</div>`;

  // Issues
  html+=`<div class="sub-l">Issues</div>`;
  if(S.issues.length){
    S.issues.forEach(i=>{
      html+=`<div class="issue-item"><div class="issue-top">
        <div class="issue-title">${e(i.title)}</div>
        <span class="ib ${i.status}" onclick="cycleI(${i.id})">${i.status}</span>
        <button class="a-rm" onclick="rmIssue(${i.id})">&times;</button>
      </div>
      <input type="text" placeholder="Resolution notes..." value="${e(i.notes)}" oninput="iNotes(${i.id},this.value)"
        style="width:100%;border:none;border-bottom:1px solid var(--bg);padding:5px 0;font-size:12px;font-family:'Arvo',serif;margin-top:3px">
      </div>`;
    });
  } else html+=`<div style="font-size:12px;color:var(--mid);padding:4px 0">No issues raised yet.</div>`;

  html+=`<div class="add-row"><input type="text" id="iT" placeholder="Raise an issue..." onkeydown="if(event.key==='Enter')addIssue()"><button class="add-btn" onclick="addIssue()">+ Issue</button></div>`;

  // Actions
  html+=`<div class="sub-l" style="margin-top:20px">Actions</div>`;
  html+=rActionsList(S.actions);
  html+=rAddAction(oo, curSecName());

  return html;
}

function rWrapupSection(){
  let html=`<div class="main-sub">Review all actions and headlines from this meeting.</div>`;

  // All actions summary
  const openActions=S.actions.filter(a=>!a.done);
  const doneActions=S.actions.filter(a=>a.done);

  html+=`<div class="sub-l">Open actions (${openActions.length})</div>`;
  if(openActions.length){
    openActions.forEach(a=>{
      html+=`<div class="a-item">
        <div class="a-chk" onclick="toggleAction('${a.id}')""></div>
        <div style="flex:1"><div class="a-txt">${e(a.text)}</div>
        <div class="a-meta">${a.owner?'<span>'+e(a.owner)+'</span>':''}${a.due?'<span>Due '+a.due+'</span>':''}${a.section?'<span>From: '+e(a.section)+'</span>':''}</div></div>
      </div>`;
    });
  } else html+=`<div style="font-size:12px;color:var(--mid)">No open actions.</div>`;

  if(doneActions.length){
    html+=`<div class="sub-l">Completed (${doneActions.length})</div>`;
    doneActions.forEach(a=>{
      html+=`<div class="a-item">
        <div class="a-chk done" onclick="toggleAction('${a.id}')">&#10003;</div>
        <div style="flex:1"><div class="a-txt dn">${e(a.text)}</div>
        <div class="a-meta">${a.owner?'<span>'+e(a.owner)+'</span>':''}</div></div>
      </div>`;
    });
  }

  // Section notes
  const notedSections=curSections().filter(s=>s.notes);
  if(notedSections.length){
    html+=`<div class="sub-l" style="margin-top:20px">Section notes</div>`;
    notedSections.forEach(s=>{
      html+=`<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:700;margin-bottom:3px">${e(s.name)}</div><div style="font-size:12px;color:var(--mid);white-space:pre-wrap">${e(s.notes)}</div></div>`;
    });
  }

  // Headlines
  if(S.headlines.length){
    html+=`<div class="sub-l" style="margin-top:20px">Headlines</div>`;
    S.headlines.forEach(h=>{
      html+=`<div style="font-size:12px;margin-bottom:6px"><span class="ib ${h.status}" style="font-size:9px;margin-right:6px">${h.status}</span>${e(h.text)}${h.notes?' \u2014 <span style="color:var(--mid)">'+e(h.notes)+'</span>':''}</div>`;
    });
  }

  return html;
}

function rActionsList(actions){
  if(!actions.length) return '<div style="font-size:12px;color:var(--mid);padding:4px 0">No actions yet.</div>';
  return actions.map(a=>`
    <div class="a-item">
      <div class="a-chk ${a.done?'done':''}" onclick="toggleAction('${a.id}')">${a.done?'&#10003;':''}</div>
      <div style="flex:1">
        <div class="a-txt ${a.done?'dn':''}">${e(a.text)}</div>
        <div class="a-meta">${a.owner?'<span>'+e(a.owner)+'</span>':''}${a.due?'<span>Due '+a.due+'</span>':''}</div>
      </div>
      <button class="a-rm" onclick="deleteAction('${a.id}')">&times;</button>
    </div>`).join('');
}

function rAddAction(oo, section){
  return `<div class="add-row">
    <input type="text" id="aT" placeholder="New action..." onkeydown="if(event.key==='Enter'){const o=document.getElementById('aO'),d=document.getElementById('aD');addAction(this.value,o?o.value:'',d?d.value:'','${e(section)}');this.value='';}">
    <select id="aO"><option value="">Owner</option>${oo}</select>
    <input type="date" id="aD" style="max-width:140px">
    <button class="add-btn" onclick="const t=document.getElementById('aT'),o=document.getElementById('aO'),d=document.getElementById('aD');if(t.value.trim()){addAction(t.value.trim(),o?o.value:'',d?d.value:'','${e(section)}');t.value='';}">+ Action</button>
  </div>`;
}

function promptActionFromHL(hlId){
  const hl=S.headlines.find(h=>h.id===hlId);
  if(!hl) return;
  const text=prompt('Action from "'+hl.text+'":', '');
  if(!text) return;
  const owner=prompt('Owner:','');
  addAction(text, owner||'', '', curSecName());
}

/* ══ AGENDA EDITOR MODAL ══ */
function rAgendaEditor(){
  const types=[{v:'notes',l:'Notes'},{v:'headlines',l:'Headlines'},{v:'issues',l:'Issues & Actions'},{v:'wrapup',l:'Wrap-up'}];
  let rows=S.editAgenda.map((s,i)=>{
    const typeOpts=types.map(t=>`<option value="${t.v}" ${s.type===t.v?'selected':''}>${t.l}</option>`).join('');
    return `<div class="modal-sec">
      <input type="text" value="${e(s.name)}" oninput="edSetName(${i},this.value)">
      <input type="number" class="dur-input" value="${s.duration}" min="1" max="120" oninput="edSetDur(${i},this.value)"> min
      <select onchange="edSetType(${i},this.value)" style="font-size:11px;padding:4px 6px;border:1px solid var(--bdr);border-radius:4px">${typeOpts}</select>
      <button class="rm-sec" onclick="edRmSec(${i})">&times;</button>
    </div>`;
  }).join('');

  return `<div class="modal-bg" onclick="if(event.target===this)closeAgendaEditor()">
    <div class="modal">
      <h3>Edit agenda</h3>
      <p style="font-size:12px;color:var(--mid);margin-bottom:12px">Changes are saved for this recurring meeting series. All future meetings will use this agenda.</p>
      ${rows}
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="add-btn sec" onclick="edAddSec()">+ Add section</button>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
        <button class="hdr-btn" style="background:var(--bg);color:var(--dark)" onclick="closeAgendaEditor()">Cancel</button>
        <button class="add-btn" onclick="edSave()">Save agenda</button>
      </div>
    </div>
  </div>`;
}

/* ══ SUMMARY ══ */
function rSummary(){
  const mt=S.activeMeeting?S.activeMeeting.subject:'Ad-hoc meeting';
  const tm=Math.floor(S.elapsed/60);
  const ts=S.startTime?S.startTime.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit',hour12:true}):'';
  const ds=S.startTime?S.startTime.toLocaleDateString('en-NZ',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}):'';
  const att=S.activeMeeting?S.activeMeeting.attendees.map(a=>a.name).join(', '):'';

  const sH=S.sections.filter(s=>s.notes).map(s=>`<div class="sum-sec"><h3>${e(s.name)}</h3><div class="sum-notes">${e(s.notes)}</div></div>`).join('');
  const openA=S.actions.filter(a=>!a.done);
  const doneA=S.actions.filter(a=>a.done);
  const aH=openA.length?openA.map(a=>`<div class="sum-act"><div class="sum-dot"></div><div>${e(a.text)}${a.owner?' \u2014 '+e(a.owner):''}${a.due?' (due '+a.due+')':''}</div></div>`).join(''):'<div style="font-size:12px;color:var(--mid)">No open actions.</div>';
  const hlH=S.headlines.length?S.headlines.map(h=>`<div class="sum-act"><div class="sum-dot" style="background:${h.status==='discussed'?'var(--green)':'var(--blue)'}"></div><div>${e(h.text)} <span class="ib ${h.status}" style="font-size:9px">${h.status}</span></div></div>`).join(''):'';

  const plain=`${mt}\n${ds} at ${ts}\n${att?'Attendees: '+att+'\n':''}Duration: ${tm} minutes\n\n${S.sections.filter(s=>s.notes).map(s=>s.name+':\n'+s.notes).join('\n\n')}\n\nOpen actions:\n${openA.map(a=>'\u2022 '+a.text+(a.owner?' \u2014 '+a.owner:'')+(a.due?' (due '+a.due+')':'')).join('\n')||'None'}\n${S.headlines.length?'\nHeadlines:\n'+S.headlines.map(h=>'\u2022 ['+h.status+'] '+h.text+(h.notes?': '+h.notes:'')).join('\n'):''}`;

  return `<div class="card" style="margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:16px;font-weight:700;color:var(--red)">Meeting Summary</div>
      <div style="font-size:12px;color:var(--mid)">${tm} min</div>
    </div>
    <div style="font-size:12px;color:var(--mid);margin-top:4px">${ds}${ts?' at '+ts:''}${att?'<br>Attendees: '+att:''}</div>
  </div>
  ${sH?'<div class="card">'+sH+'</div>':''}
  <div class="card"><div class="sum-sec"><h3>Open actions</h3>${aH}</div>${doneA.length?'<div class="sum-sec"><h3>Completed</h3>'+doneA.map(a=>'<div class="sum-act"><div class="sum-dot" style="background:var(--green)"></div><div style="text-decoration:line-through;opacity:.5">'+e(a.text)+'</div></div>').join('')+'</div>':''}</div>
  ${hlH?'<div class="card"><div class="sum-sec"><h3>Headlines</h3>'+hlH+'</div></div>':''}
  <div style="display:flex;gap:8px;margin-top:12px" id="sT" data-plain="${e(plain)}">
    <button class="add-btn" id="cBtn" onclick="copySummary()" style="flex:1">Copy summary</button>
    <button class="add-btn" onclick="window.print()" style="flex:1;background:var(--dark)">Print</button>
    <button class="add-btn" onclick="backToDash()" style="flex:1;background:var(--mid)">\u2190 Dashboard</button>
  </div>`;
}

function copySummary(){
  const el=document.getElementById('sT');
  navigator.clipboard.writeText(el?el.getAttribute('data-plain'):'').then(()=>{
    const b=document.getElementById('cBtn');if(b){b.textContent='Copied!';setTimeout(()=>{b.textContent='Copy summary'},1500);}
  });
}

function e(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

/* ═══ INIT ═══ */
initAuth();
</script>
